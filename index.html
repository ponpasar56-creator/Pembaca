<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>DocuMind Vault - Fast PDF Reader</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e4a6e">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        :root { --primary: #1e4a6e; --bg: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { font-family: 'Inter', sans-serif; background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Header */
        .app-bar {
            background: white; padding: 8px 15px; display: flex; align-items: center; 
            justify-content: space-between; gap: 10px; z-index: 100; border-bottom: 1px solid #e2e8f0;
        }
        
        .logo-area { display: flex; align-items: center; gap: 8px; }
        .logo-icon img { width: 28px; height: 28px; border-radius: 6px; }
        .logo-text { font-weight: 800; font-size: 1rem; color: var(--primary); display: none; }
        @media (min-width: 480px) { .logo-text { display: block; } }

        .info-status {
            background: #e2e8f0;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: #1e293b;
        }

        /* Main Layout */
        .main-layout { flex: 1; display: flex; overflow: hidden; position: relative; }

        /* Sidebar Library */
        .sidebar {
            width: 280px; background: white; border-right: 1px solid #e2e8f0;
            display: flex; flex-direction: column; transition: 0.3s ease;
            position: absolute; left: -280px; top: 0; bottom: 0; z-index: 200;
            box-shadow: 2px 0 12px rgba(0,0,0,0.1);
        }
        .sidebar.active { left: 0; }
        .sidebar-header { padding: 15px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; }

        .file-list { flex: 1; overflow-y: auto; padding: 10px; }
        
        /* Custom scrollbar untuk sidebar */
        .file-list::-webkit-scrollbar { width: 8px; }
        .file-list::-webkit-scrollbar-track { background: #e2e8f0; border-radius: 10px; }
        .file-list::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
        
        .file-card {
            background: #fff; border: 1px solid #e2e8f0; padding: 10px; border-radius: 12px;
            margin-bottom: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
            transition: all 0.2s;
        }
        .file-card:hover { border-color: var(--primary); background: #f8fafc; }
        .file-card.active { background: #eff6ff; border-color: var(--primary); }

        /* ========== VIEWER DENGAN IFRAME (NATIVE PDF RENDER) ========== */
        .viewer-wrapper {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #525659;
        }
        
        .pdf-iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #525659;
        }
        
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #cbd5e1;
            text-align: center;
            padding: 20px;
        }
        
        .empty-state i {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        .empty-state p {
            font-size: 16px;
            margin-bottom: 8px;
        }
        
        .empty-state small {
            font-size: 13px;
            opacity: 0.7;
        }

        /* Floating Buttons */
        .fab-group {
            position: fixed;
            bottom: 24px;
            right: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 300;
        }
        .fab {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: none;
            color: white;
            box-shadow: 0 6px 14px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }
        .fab:active { transform: scale(0.95); }
        .btn-add { background: var(--primary); }
        .btn-lib { background: #475569; }
        
        #loading {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            color: white;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }
        
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #334155;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 640px) {
            .fab-group { bottom: 16px; right: 16px; gap: 10px; }
            .fab { width: 48px; height: 48px; font-size: 20px; }
        }
    </style>
</head>
<body>

<div id="loading">
    <div class="spinner"></div>
    <p style="margin-top:16px; font-weight:500;">Memuat dokumen...</p>
    <p style="margin-top:8px; font-size:12px; opacity:0.7;">Ini akan cepat, tunggu sebentar</p>
</div>

<header class="app-bar">
    <div class="logo-area">
        <div class="logo-icon"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%231e4a6e'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' fill='white' font-size='48' font-weight='bold'%3EDV%3C/text%3E%3C/svg%3E" alt="Logo"></div>
        <div class="logo-text">DocuMind Vault</div>
    </div>
    <div class="info-status" id="pageInfo">
        <i class="fas fa-file-pdf"></i> Siap
    </div>
</header>

<div class="main-layout">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <strong><i class="fas fa-book-open"></i> Pustaka Saya</strong>
            <button onclick="toggleSidebar()" style="border:none; background:none; font-size:18px; cursor:pointer;"><i class="fas fa-times"></i></button>
        </div>
        <div class="file-list" id="fileList"></div>
        <div style="padding: 12px; border-top: 1px solid #e2e8f0; font-size: 11px; color: #64748b; text-align: center;">
            <i class="fas fa-database"></i> Penyimpanan Lokal
        </div>
    </aside>

    <div class="viewer-wrapper">
        <iframe id="pdfFrame" class="pdf-iframe" src="about:blank" title="PDF Viewer"></iframe>
    </div>
</div>

<div class="fab-group">
    <button class="fab btn-lib" onclick="toggleSidebar()"><i class="fas fa-folder"></i></button>
    <button class="fab btn-add" onclick="document.getElementById('fileInput').click()"><i class="fas fa-plus"></i></button>
</div>

<input type="file" id="fileInput" hidden accept=".pdf">

<script>
    // ==================== DATA STORAGE ====================
    let dbFiles = JSON.parse(localStorage.getItem('docu_vault_iframe') || '[]');
    let currentDocId = null;
    let currentDocName = '';
    
    // ==================== UTILITIES ====================
    function toggleSidebar() { 
        document.getElementById('sidebar').classList.toggle('active'); 
    }
    
    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }
    
    function formatFileSize(bytes) {
        if (!bytes) return '0 KB';
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }
    
    // Update info di header
    function updateHeaderInfo(name, pageCount = null) {
        const infoDiv = document.getElementById('pageInfo');
        if (name) {
            const shortName = name.length > 30 ? name.substring(0, 27) + '...' : name;
            if (pageCount) {
                infoDiv.innerHTML = `<i class="fas fa-file-pdf"></i> ${shortName} (${pageCount} hlm)`;
            } else {
                infoDiv.innerHTML = `<i class="fas fa-file-pdf"></i> ${shortName}`;
            }
        } else {
            infoDiv.innerHTML = `<i class="fas fa-file-pdf"></i> Siap`;
        }
    }
    
    // ==================== DISPLAY PDF MENGGUNAKAN BLOB URL (TERCEPAT & PALING STABIL) ====================
    async function displayPDFInIframe(fileDataBase64, fileName) {
        const loader = document.getElementById('loading');
        const iframe = document.getElementById('pdfFrame');
        
        loader.style.display = 'flex';
        
        try {
            // Konversi base64 ke blob
            const binaryString = atob(fileDataBase64);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            
            const blob = new Blob([bytes], { type: 'application/pdf' });
            const blobUrl = URL.createObjectURL(blob);
            
            // Hapus blob URL lama jika ada
            if (window.currentBlobUrl) {
                URL.revokeObjectURL(window.currentBlobUrl);
            }
            
            window.currentBlobUrl = blobUrl;
            
            // Set iframe source
            iframe.src = blobUrl;
            
            // Update header
            updateHeaderInfo(fileName);
            
            // Sembunyikan loading setelah iframe mulai memuat
            iframe.onload = () => {
                setTimeout(() => {
                    loader.style.display = 'none';
                }, 500);
            };
            
            // Timeout fallback untuk loading
            setTimeout(() => {
                if (loader.style.display === 'flex') {
                    loader.style.display = 'none';
                }
            }, 3000);
            
        } catch (err) {
            console.error('Error displaying PDF:', err);
            loader.style.display = 'none';
            alert('Gagal menampilkan PDF: ' + err.message);
            iframe.src = 'about:blank';
            updateHeaderInfo('');
        }
    }
    
    // ==================== DISPLAY FILE ====================
    async function displayFile(id) {
        const file = dbFiles.find(f => f.id === id);
        if (!file) return;
        
        currentDocId = id;
        currentDocName = file.name;
        
        // Tutup sidebar di mobile
        if (window.innerWidth < 768) {
            document.getElementById('sidebar').classList.remove('active');
        }
        
        // Tampilkan PDF
        await displayPDFInIframe(file.data, file.name);
        
        // Update active state di library
        renderLibrary();
    }
    
    // ==================== DELETE FILE ====================
    async function deleteFile(id) {
        if (confirm('Hapus dokumen ini dari perpustakaan?')) {
            dbFiles = dbFiles.filter(f => f.id !== id);
            localStorage.setItem('docu_vault_iframe', JSON.stringify(dbFiles));
            renderLibrary();
            
            if (currentDocId === id) {
                currentDocId = null;
                currentDocName = '';
                const iframe = document.getElementById('pdfFrame');
                iframe.src = 'about:blank';
                updateHeaderInfo('');
                
                // Tampilkan empty state di viewer (iframe sudah about:blank, tapi kita bisa show pesan)
                const wrapper = document.querySelector('.viewer-wrapper');
                // Tidak perlu tambahan, iframe kosong sudah cukup
            }
        }
    }
    
    // ==================== RENDER LIBRARY ====================
    function renderLibrary() {
        const list = document.getElementById('fileList');
        if (!list) return;
        
        if (dbFiles.length === 0) {
            list.innerHTML = `
                <div style="text-align: center; padding: 40px 20px; color: #94a3b8;">
                    <i class="fas fa-folder-open fa-3x" style="margin-bottom: 12px; opacity: 0.5;"></i>
                    <p style="font-size: 14px;">Belum ada file PDF</p>
                    <p style="font-size: 12px; margin-top: 8px;">Tap tombol + untuk menambah</p>
                </div>
            `;
            return;
        }
        
        list.innerHTML = dbFiles.map(f => `
            <div class="file-card ${currentDocId === f.id ? 'active' : ''}" onclick="displayFile('${f.id}')">
                <div style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 190px;">
                    <i class="fas fa-file-pdf" style="color: #ef4444;"></i> 
                    <span style="font-size: 13px;">${escapeHtml(f.name)}</span>
                </div>
                <i class="fas fa-trash-alt" style="color:#f87171; padding:6px; border-radius:20px; cursor:pointer;" onclick="event.stopPropagation(); deleteFile('${f.id}')"></i>
            </div>
        `).join('');
    }
    
    // ==================== TAMBAH FILE PDF BARU ====================
    document.getElementById('fileInput').onchange = async function(e) {
        const file = e.target.files[0];
        if (!file) return;
        
        if (file.type !== 'application/pdf') {
            alert('📄 Hanya file PDF yang didukung untuk performa terbaik');
            return;
        }
        
        const loader = document.getElementById('loading');
        loader.style.display = 'flex';
        document.querySelector('#loading p').innerText = 'Membaca file PDF...';
        
        try {
            // Baca file sebagai base64
            const base64 = await new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => {
                    // Hasil reader adalah base64 dengan prefix, kita ambil data-nya
                    const base64String = reader.result.split(',')[1];
                    resolve(base64String);
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
            
            const newDoc = {
                id: Date.now().toString(),
                name: file.name,
                data: base64,
                type: 'pdf',
                size: file.size,
                added: new Date().toISOString()
            };
            
            dbFiles.unshift(newDoc);
            localStorage.setItem('docu_vault_iframe', JSON.stringify(dbFiles));
            renderLibrary();
            
            // Langsung tampilkan file yang baru ditambahkan
            await displayPDFInIframe(base64, file.name);
            currentDocId = newDoc.id;
            renderLibrary(); // refresh active state
            
            loader.style.display = 'none';
            
        } catch (err) {
            console.error(err);
            loader.style.display = 'none';
            alert('Gagal menyimpan file: ' + err.message);
        }
        
        // Reset input file
        e.target.value = '';
    };
    
    // ==================== DRAG & DROP SUPPORT ====================
    const viewerWrapper = document.querySelector('.viewer-wrapper');
    
    viewerWrapper.addEventListener('dragover', (e) => {
        e.preventDefault();
        viewerWrapper.style.opacity = '0.8';
        viewerWrapper.style.backgroundColor = '#334155';
    });
    
    viewerWrapper.addEventListener('dragleave', (e) => {
        e.preventDefault();
        viewerWrapper.style.opacity = '1';
        viewerWrapper.style.backgroundColor = '';
    });
    
    viewerWrapper.addEventListener('drop', async (e) => {
        e.preventDefault();
        viewerWrapper.style.opacity = '1';
        viewerWrapper.style.backgroundColor = '';
        
        const file = e.dataTransfer.files[0];
        if (file && file.type === 'application/pdf') {
            // Trigger input change manually
            const dataTransfer = new DataTransfer();
            dataTransfer.items.add(file);
            document.getElementById('fileInput').files = dataTransfer.files;
            document.getElementById('fileInput').dispatchEvent(new Event('change'));
        } else if (file) {
            alert('Drop file PDF saja untuk hasil terbaik');
        }
    });
    
    // ==================== INISIALISASI ====================
    renderLibrary();
    
    // Tampilkan file pertama jika ada
    if (dbFiles.length > 0) {
        setTimeout(() => {
            displayFile(dbFiles[0].id);
        }, 100);
    } else {
        // Tampilkan pesan selamat datang di iframe? biarkan kosong dengan instruksi
        const iframe = document.getElementById('pdfFrame');
        iframe.srcdoc = `
            <html style="background:#525659; display:flex; align-items:center; justify-content:center; height:100%; font-family:sans-serif;">
                <body style="margin:0; background:#525659; display:flex; align-items:center; justify-content:center; height:100%;">
                    <div style="text-align:center; color:#cbd5e1;">
                        <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:20px; opacity:0.5;">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                            <polyline points="14 2 14 8 20 8"/>
                            <line x1="12" y1="18" x2="12" y2="12"/>
                            <line x1="9" y1="15" x2="15" y2="15"/>
                        </svg>
                        <h3 style="margin:0 0 8px 0;">DocuMind Vault</h3>
                        <p style="margin:0; font-size:14px;">Tambahkan file PDF untuk mulai membaca</p>
                        <p style="margin-top:8px; font-size:12px; opacity:0.6;">Tap tombol + di pojok kanan bawah</p>
                    </div>
                </body>
            </html>
        `;
    }
    
    // Cleanup blob URL saat halaman ditutup (opsional)
    window.addEventListener('beforeunload', () => {
        if (window.currentBlobUrl) {
            URL.revokeObjectURL(window.currentBlobUrl);
        }
    });
</script>
</body>
</html>
