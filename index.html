<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuMind Vault HD</title>
    
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>

    <style>
        :root { --primary: #1e4a6e; --bg: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Style Pencarian & Highlight */
        mark.highlight { background: #ffeb3b; color: black; border-radius: 2px; padding: 1px 0; }
        mark.highlight.active { background: #f57c00; color: white; border-radius: 2px; }

        .app-bar { background: white; padding: 10px; display: flex; align-items: center; border-bottom: 1px solid #e2e8f0; }
        .search-box { flex: 1; display: flex; align-items: center; background: #f1f5f9; padding: 5px 10px; border-radius: 20px; }
        .search-box input { flex: 1; border: none; background: transparent; outline: none; margin: 0 10px; }

        .viewer-container { flex: 1; overflow: auto; background: #525659; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .page-wrapper { background: white; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        .fab { position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; border-radius: 50%; border: none; background: var(--primary); color: white; z-index: 100; }
    </style>
</head>
<body>

<header class="app-bar">
    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Cari teks...">
        <span id="matchStatus" style="font-size:12px; margin-right:10px;">0/0</span>
        <button onclick="navSearch(-1)"><i class="fas fa-chevron-up"></i></button>
        <button onclick="navSearch(1)"><i class="fas fa-chevron-down"></i></button>
    </div>
</header>

<main class="viewer-container" id="viewer"></main>
<button class="fab" onclick="document.getElementById('fileInput').click()"><i class="fas fa-plus"></i></button>
<input type="file" id="fileInput" hidden accept=".pdf,.docx">

<script>
    const pdfjs = window['pdfjs-dist/build/pdf'];
    pdfjs.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    let dbFiles = JSON.parse(localStorage.getItem('docu_vault_v4') || '[]');
    let matches = [];
    let currentMatchIdx = -1;

    // FUNGSI GLOBAL (Agar tidak "not defined")
    async function displayFile(id) {
        const file = dbFiles.find(f => f.id === id);
        if(!file) return;
        const viewer = document.getElementById('viewer');
        viewer.innerHTML = 'Loading...';
        
        const bytes = new Uint8Array(atob(file.data).split("").map(c => c.charCodeAt(0)));
        try {
            viewer.innerHTML = '';
            const pdf = await pdfjs.getDocument({data: bytes.buffer}).promise;
            for(let i=1; i<=pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const viewport = page.getViewport({scale: 1.5});
                const canvas = document.createElement('canvas');
                canvas.height = viewport.height; canvas.width = viewport.width;
                viewer.appendChild(canvas);
                await page.render({canvasContext: canvas.getContext('2d'), viewport}).promise;
            }
        } catch(e) { alert("Gagal memuat: " + e.message); }
    }

    // Fungsi Highlight
    document.getElementById('searchInput').oninput = function() {
        const query = this.value.toLowerCase().trim();
        const container = document.getElementById('viewer');
        // Reset highlight
        container.innerHTML = container.innerHTML.replace(/<mark class="highlight( active)?">|<\/mark>/gi, '');
        matches = [];
        if(query.length < 2) return;

        const regex = new RegExp(`(${query})`, 'gi');
        container.innerHTML = container.innerHTML.replace(regex, '<mark class="highlight">$1</mark>');
        matches = Array.from(document.querySelectorAll('mark.highlight'));
        currentMatchIdx = 0;
        updateSearch();
    };

    function updateSearch() {
        document.getElementById('matchStatus').innerText = matches.length > 0 ? `${currentMatchIdx+1}/${matches.length}` : '0/0';
        matches.forEach((m, i) => m.classList.toggle('active', i === currentMatchIdx));
        if(matches[currentMatchIdx]) matches[currentMatchIdx].scrollIntoView({behavior:'smooth', block:'center'});
    }

    function navSearch(dir) {
        if(!matches.length) return;
        currentMatchIdx = (currentMatchIdx + dir + matches.length) % matches.length;
        updateSearch();
    }

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = function() {
            const base64 = btoa(new Uint8Array(this.result).reduce((s, b) => s + String.fromCharCode(b), ''));
            const newDoc = { id: Date.now().toString(), name: file.name, data: base64 };
            dbFiles.unshift(newDoc);
            localStorage.setItem('docu_vault_v4', JSON.stringify(dbFiles));
            displayFile(newDoc.id);
        };
        reader.readAsArrayBuffer(file);
    });
</script>
</body>
</html>
