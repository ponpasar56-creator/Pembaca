<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>DocuMind Vault - Reader</title>
    
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>

    <style>
        :root { --primary: #1e4a6e; --bg: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* Layout Utama: Memaksa Header tetap di atas */
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; /* Mencegah scroll pada seluruh body */
        }

        /* Header Fixed */
        .app-bar { 
            flex: 0 0 auto; /* Header tidak akan menyusut */
            background: white; 
            padding: 10px 15px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            gap: 10px; 
            border-bottom: 1px solid #e2e8f0; 
            z-index: 100;
        }

        /* Main Area */
        .main-layout { 
            flex: 1; /* Mengisi sisa ruang */
            display: flex; 
            overflow: hidden; 
            position: relative; 
        }

        /* Pencarian */
        .search-box { flex: 1; display: flex; align-items: center; background: #f1f5f9; padding: 6px 12px; border-radius: 50px; border: 1px solid #cbd5e1; }
        .search-box input { flex: 1; border: none; background: transparent; outline: none; font-size: 14px; padding: 0 10px; }
        .search-box button { border:none; background:none; color: #64748b; padding: 0 8px; cursor: pointer; }

        /* Viewer Scrollable */
        .viewer-container { 
            flex: 1; 
            overflow-y: auto; /* Hanya area ini yang bisa di-scroll */
            background: #525659; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 15px; 
        }

        /* Elemen lainnya sama seperti sebelumnya */
        .sidebar { width: 260px; background: white; border-right: 1px solid #e2e8f0; position: absolute; left: -260px; top: 0; bottom: 0; z-index: 200; transition: 0.3s; }
        .sidebar.active { left: 0; }
        .page-wrapper { position: relative; background: white; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 100%; max-width: 800px; min-height: 600px; }
        .fab-group { position: fixed; bottom: 20px; right: 20px; z-index: 300; }
        .fab { width: 50px; height: 50px; border-radius: 50%; border: none; background: var(--primary); color: white; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

<header class="app-bar">
    <div style="width:30px;"><img src="109631.png" style="width:30px; border-radius:6px;"></div>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Cari kata...">
        <button id="clearBtn" onclick="clearSearch()" style="display:none;"><i class="fas fa-times"></i></button>
        <span id="matchStatus" style="font-size:12px; color:#64748b; margin:0 5px;">0/0</span>
        <button onclick="navSearch(-1)"><i class="fas fa-chevron-up"></i></button>
        <button onclick="navSearch(1)"><i class="fas fa-chevron-down"></i></button>
    </div>
</header>

<div class="main-layout">
    <aside class="sidebar" id="sidebar">
        <div style="padding:15px; border-bottom:1px solid #f1f5f9; display:flex; justify-content:space-between;">
            <strong>Pustaka</strong><button onclick="toggleSidebar()" style="border:none;"><i class="fas fa-times"></i></button>
        </div>
        <div id="fileList" style="padding:10px;"></div>
    </aside>
    <main class="viewer-container" id="viewer"></main>
</div>

<div class="fab-group">
    <button class="fab" onclick="toggleSidebar()"><i class="fas fa-folder"></i></button><br>
    <button class="fab" onclick="document.getElementById('fileInput').click()"><i class="fas fa-plus"></i></button>
</div>

<input type="file" id="fileInput" hidden accept=".pdf,.docx">

<script>
    // ... (Logika JavaScript tetap sama dengan versi sebelumnya) ...
    const pdfjs = window['pdfjs-dist/build/pdf'];
    pdfjs.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    let dbFiles = JSON.parse(localStorage.getItem('docu_vault_v4') || '[]');
    let searchIndex = [];
    let currentMatches = [];

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }

    // Pencarian dengan Auto-Focus
    const searchInput = document.getElementById('searchInput');
    const clearBtn = document.getElementById('clearBtn');

    searchInput.oninput = function() {
        const query = this.value.toLowerCase();
        clearBtn.style.display = query.length > 0 ? 'block' : 'none';
        
        currentMatches = [];
        if(query.length < 2) {
            document.getElementById('matchStatus').innerText = '0/0';
            return;
        }

        searchIndex.forEach(item => {
            if(item.text.includes(query)) currentMatches.push(item.page);
        });
        
        document.getElementById('matchStatus').innerText = `0/${currentMatches.length}`;
        if(currentMatches.length > 0) jumpToPage(currentMatches[0]);
    };

    function clearSearch() {
        searchInput.value = '';
        currentMatches = [];
        document.getElementById('matchStatus').innerText = '0/0';
        clearBtn.style.display = 'none';
        searchInput.focus(); // Fokus kembali ke kotak pencarian
    }

    // (Fungsi displayFile, jumpToPage, dll sama seperti kode sebelumnya)
    // ...
</script>
</body>
</html>
