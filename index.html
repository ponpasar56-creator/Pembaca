<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PDF Reader Pro - PT Mitra Setia Budi Sejahtera</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        :root {
            --primary: #e94560;
            --secondary: #533483;
            --bg-dark: #1a1a2e;
            --toolbar-bg: #16213e;
            --accent: #0f3460;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* FIX: Toolbar Tetap di Atas */
        .toolbar {
            background: var(--toolbar-bg);
            color: white;
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            border-bottom: 2px solid var(--accent);
            z-index: 1000;
            flex-shrink: 0;
        }

        .toolbar-group {
            display: flex;
            gap: 5px;
            align-items: center;
            background: var(--accent);
            padding: 5px 10px;
            border-radius: 8px;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            display: flex;
            gap: 5px;
        }

        .search-box input {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            border: none;
            font-size: 14px;
            outline: none;
        }

        button {
            background: var(--primary);
            border: none;
            color: white;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        button:active { opacity: 0.7; }

        /* Container Utama */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* Area PDF */
        .content-area {
            flex: 1;
            overflow: auto; /* Scroll utama */
            background: #3a3d40;
            position: relative;
            scrollbar-gutter: stable;
        }

        /* FIX: Scrollbar lebih nyaman untuk jari */
        .content-area::-webkit-scrollbar {
            width: 12px;
            height: 12px;
        }
        .content-area::-webkit-scrollbar-track {
            background: #2a2d30;
        }
        .content-area::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
            border: 2px solid #2a2d30;
        }

        #pdfViewer {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            transform-origin: center top; /* Pastikan zoom dari tengah atas */
            transition: transform 0.1s ease-out;
            min-width: fit-content;
        }

        .pdf-page-wrapper {
            position: relative;
            margin-bottom: 30px;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Pencarian (Highlight) */
        .highlight {
            background-color: rgba(255, 255, 0, 0.4);
            position: absolute;
            pointer-events: none;
            z-index: 10;
        }

        .highlight.current {
            background-color: rgba(255, 150, 0, 0.7);
            outline: 2px solid red;
        }

        /* Sidebar */
        .file-sidebar {
            width: 0;
            background: var(--toolbar-bg);
            transition: width 0.3s ease;
            overflow-y: auto;
            border-right: 0 solid var(--accent);
        }

        .file-sidebar.open {
            width: 250px;
            border-right-width: 2px;
        }

        .loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 2000;
        }
    </style>
</head>
<body>

    <div class="loading-overlay" id="loader">Memproses PDF...</div>

    <div class="toolbar">
        <div class="toolbar-group">
            <button onclick="document.getElementById('fileInput').click()">📁 Open</button>
            <input type="file" id="fileInput" accept=".pdf" style="display: none;">
            <button onclick="toggleSidebar()" style="background: var(--secondary)">📋 Files</button>
        </div>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Cari teks (contoh: front handle)...">
            <button onclick="startSearch()">🔍</button>
            <button onclick="prevMatch()" style="background: var(--accent)">◀</button>
            <button onclick="nextMatch()" style="background: var(--accent)">▶</button>
            <span id="searchStatus" style="font-size: 12px; min-width: 45px; text-align: center;">0/0</span>
        </div>

        <div class="toolbar-group">
            <span id="zoomLabel" style="font-weight: bold; min-width: 40px;">100%</span>
            <button onclick="resetZoom()" style="background: var(--secondary)">⟳</button>
        </div>
    </div>

    <div class="main-container">
        <div id="fileSidebar" class="file-sidebar">
            <div style="padding: 15px; border-bottom: 1px solid var(--accent); color: white;">
                <strong>History File</strong>
            </div>
            <div id="fileList"></div>
        </div>

        <div class="content-area" id="scrollContainer">
            <div id="pdfViewer">
                <div style="color: #888; padding-top: 100px; text-align: center;">
                    <p>PDF Reader Pro Siap</p>
                    <p style="font-size: 12px; margin-top: 10px;">Gunakan 2 jari untuk zoom</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        let pdfDoc = null;
        let scale = 1.0;
        let visualScale = 1.0;
        let pagesData = [];
        let matches = [];
        let currentMatchIdx = -1;

        // --- PINCH ZOOM PERBAIKAN (Agar Tidak Berpindah) ---
        let initialDist = 0;
        let isPinching = false;
        const scrollContainer = document.getElementById('scrollContainer');
        const pdfViewer = document.getElementById('pdfViewer');

        scrollContainer.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                isPinching = true;
                initialDist = Math.hypot(
                    e.touches[0].pageX - e.touches[1].pageX,
                    e.touches[0].pageY - e.touches[1].pageY
                );
            }
        }, { passive: false });

        scrollContainer.addEventListener('touchmove', (e) => {
            if (isPinching && e.touches.length === 2) {
                e.preventDefault();
                const dist = Math.hypot(
                    e.touches[0].pageX - e.touches[1].pageX,
                    e.touches[0].pageY - e.touches[1].pageY
                );
                
                const delta = dist / initialDist;
                visualScale = Math.min(Math.max(scale * delta, 0.4), 4.0);
                
                // Gunakan transform tanpa mengubah layout flow agar tidak "melompat"
                pdfViewer.style.transform = `scale(${visualScale / scale})`;
                document.getElementById('zoomLabel').textContent = Math.round(visualScale * 100) + '%';
            }
        }, { passive: false });

        scrollContainer.addEventListener('touchend', (e) => {
            if (isPinching) {
                isPinching = false;
                scale = visualScale;
                pdfViewer.style.transform = `scale(1)`; // Reset CSS transform
                renderAllPages(); // Render ulang agar teks tajam sesuai scale baru
            }
        });

        // --- CORE PDF LOGIC ---
        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            showLoader(true);
            const arrayBuffer = await file.arrayBuffer();
            pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            await renderAllPages();
            showLoader(false);
        });

        async function renderAllPages() {
            if (!pdfDoc) return;
            pdfViewer.innerHTML = '';
            pagesData = [];

            for (let i = 1; i <= pdfDoc.numPages; i++) {
                const page = await pdfDoc.getPage(i);
                const viewport = page.getViewport({ scale: scale });

                const wrapper = document.createElement('div');
                wrapper.className = 'pdf-page-wrapper';
                wrapper.style.width = `${viewport.width}px`;
                wrapper.style.height = `${viewport.height}px`;

                const canvas = document.createElement('canvas');
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                wrapper.appendChild(canvas);

                const textLayer = document.createElement('div');
                textLayer.className = 'text-layer';
                wrapper.appendChild(textLayer);

                pdfViewer.appendChild(wrapper);

                await page.render({ canvasContext: canvas.getContext('2d'), viewport: viewport }).promise;
                
                const textContent = await page.getTextContent();
                pagesData.push({ pageNum: i, items: textContent.items, viewport: viewport, container: wrapper });
            }
            if (document.getElementById('searchInput').value) startSearch();
        }

        // --- LOGIKA PENCARIAN AKURAT ---
        function startSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            clearHighlights();
            matches = [];
            currentMatchIdx = -1;

            if (!query) {
                updateSearchUI();
                return;
            }

            pagesData.forEach((page) => {
                let fullText = "";
                let charMap = [];

                page.items.forEach((item) => {
                    let startPos = fullText.length;
                    fullText += item.str + " ";
                    for (let i = 0; i <= item.str.length; i++) {
                        charMap.push(item);
                    }
                });

                let foundIdx = fullText.toLowerCase().indexOf(query);
                while (foundIdx !== -1) {
                    const item = charMap[foundIdx];
                    const tx = pdfjsLib.Util.transform(page.viewport.transform, item.transform);

                    const hl = document.createElement('div');
                    hl.className = 'highlight';
                    hl.style.left = `${tx[4]}px`;
                    hl.style.top = `${tx[5] - (Math.abs(item.transform[3]) * scale)}px`;
                    hl.style.width = `${item.width * scale}px`;
                    hl.style.height = `${Math.abs(item.transform[3]) * scale}px`;
                    
                    page.container.appendChild(hl);
                    matches.push(hl);

                    foundIdx = fullText.toLowerCase().indexOf(query, foundIdx + 1);
                }
            });

            updateSearchUI();
            if (matches.length > 0) nextMatch();
        }

        function nextMatch() {
            if (matches.length === 0) return;
            if (currentMatchIdx >= 0) matches[currentMatchIdx].classList.remove('current');
            currentMatchIdx = (currentMatchIdx + 1) % matches.length;
            focusMatch();
        }

        function prevMatch() {
            if (matches.length === 0) return;
            if (currentMatchIdx >= 0) matches[currentMatchIdx].classList.remove('current');
            currentMatchIdx = (currentMatchIdx - 1 + matches.length) % matches.length;
            focusMatch();
        }

        function focusMatch() {
            const match = matches[currentMatchIdx];
            match.classList.add('current');
            match.scrollIntoView({ behavior: 'smooth', block: 'center' });
            updateSearchUI();
        }

        function updateSearchUI() {
            document.getElementById('searchStatus').textContent = 
                matches.length > 0 ? `${currentMatchIdx + 1}/${matches.length}` : "0/0";
        }

        function clearHighlights() {
            document.querySelectorAll('.highlight').forEach(el => el.remove());
        }

        function resetZoom() {
            scale = 1.0;
            visualScale = 1.0;
            document.getElementById('zoomLabel').textContent = '100%';
            renderAllPages();
        }

        function toggleSidebar() {
            document.getElementById('fileSidebar').classList.toggle('open');
        }

        function showLoader(show) {
            document.getElementById('loader').style.display = show ? 'flex' : 'none';
        }

        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') startSearch();
        });
    </script>
</body>
</html>
