<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PDF Reader - PT Mitra Setia Budi Sejahtera</title>
    <!-- PDF.js library from Mozilla -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #2c3e50;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .toolbar {
            background: #34495e;
            color: white;
            padding: 10px 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            border-bottom: 2px solid #2c3e50;
            flex-shrink: 0;
        }

        .toolbar-group {
            display: flex;
            gap: 5px;
            align-items: center;
            background: #2c3e50;
            padding: 5px 10px;
            border-radius: 8px;
        }

        button {
            background: #1abc9c;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        button:hover {
            background: #16a085;
            transform: scale(1.02);
        }

        button.danger {
            background: #e74c3c;
        }

        button.danger:hover {
            background: #c0392b;
        }

        button.primary {
            background: #3498db;
        }

        button.primary:hover {
            background: #2980b9;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            display: flex;
            gap: 5px;
        }

        .search-box input {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
        }

        .search-box select {
            padding: 8px;
            border-radius: 5px;
            border: none;
        }

        .zoom-info {
            background: #2c3e50;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
        }

        .file-info {
            background: #1abc9c;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .file-sidebar {
            width: 260px;
            background: #ecf0f1;
            border-right: 1px solid #bdc3c7;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
        }

        .file-header {
            padding: 12px;
            background: #bdc3c7;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .file-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .file-item {
            background: white;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
            border: 1px solid #ddd;
        }

        .file-item:hover {
            background: #d5f5e3;
            transform: translateX(3px);
        }

        .file-item.active {
            background: #1abc9c;
            color: white;
            border-color: #1abc9c;
        }

        .file-name {
            font-size: 13px;
            word-break: break-all;
            flex: 1;
        }

        .delete-file {
            background: #e74c3c;
            border: none;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            margin-left: 8px;
        }

        .delete-file:hover {
            background: #c0392b;
        }

        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #f5f6fa;
        }

        .scroll-container {
            flex: 1;
            overflow-y: auto;
            overflow-x: auto;
            position: relative;
            background: #525659;
        }

        .pdf-wrapper {
            transform-origin: top left;
            transition: transform 0.1s ease;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .pdf-page {
            background: white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            margin: 10px auto;
            position: relative;
        }

        .pdf-page canvas {
            display: block;
            width: 100%;
            height: auto;
        }

        .highlight-layer {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .highlight rect {
            fill: yellow;
            fill-opacity: 0.5;
        }

        .highlight-current rect {
            fill: orange;
            fill-opacity: 0.7;
        }

        @media (max-width: 768px) {
            .file-sidebar {
                width: 200px;
            }
            .toolbar {
                padding: 8px;
            }
            button {
                padding: 5px 10px;
                font-size: 11px;
            }
        }
        
        .scroll-container::-webkit-scrollbar {
            width: 12px;
            height: 12px;
        }
        .scroll-container::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        .scroll-container::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 10px;
        }
        .scroll-container::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: white;
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <div class="toolbar-group">
            <button id="uploadBtn" class="primary">📁 Upload PDF</button>
            <input type="file" id="fileInput" accept=".pdf" style="display: none;">
        </div>
        <div class="toolbar-group">
            <button id="zoomOutBtn">🔍− Zoom Out</button>
            <span class="zoom-info" id="zoomLevel">100%</span>
            <button id="zoomInBtn">🔍+ Zoom In</button>
            <button id="resetZoomBtn">⟳ Reset</button>
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Cari teks dalam PDF...">
            <select id="searchType">
                <option value="case">Case Sensitive</option>
                <option value="insensitive">Case Insensitive</option>
            </select>
            <button id="searchBtn">🔍 Cari</button>
            <button id="prevBtn" title="Previous">◀</button>
            <button id="nextBtn" title="Next">▶</button>
            <span id="searchCounter" style="font-size:12px;">0/0</span>
        </div>
        <div class="file-info" id="currentFileInfo">
            No file loaded
        </div>
    </div>

    <div class="main-container">
        <div class="file-sidebar">
            <div class="file-header">
                <span>📄 Saved Files</span>
                <button id="clearAllBtn" class="danger" style="padding:4px 8px; font-size:11px;">Clear All</button>
            </div>
            <div class="file-list" id="fileList">
                <div style="color:#7f8c8d; text-align:center; padding:20px;">No files saved</div>
            </div>
        </div>

        <div class="content-area">
            <div class="scroll-container" id="scrollContainer">
                <div class="pdf-wrapper" id="pdfWrapper">
                    <div class="loading" id="loadingMsg">
                        👈 Upload atau pilih file PDF di sebelah kiri<br>
                        Support: File .pdf asli
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configure PDF.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        
        // Data storage
        let files = [];
        let currentFileId = null;
        let currentPdfData = null; // Store ArrayBuffer
        let currentPdfDoc = null;
        let currentPages = [];
        let zoom = 1.0;
        let currentMatches = [];
        let currentMatchIndex = -1;
        
        // DOM elements
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const fileListDiv = document.getElementById('fileList');
        const pdfWrapper = document.getElementById('pdfWrapper');
        const scrollContainer = document.getElementById('scrollContainer');
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const searchCounter = document.getElementById('searchCounter');
        const zoomInBtn = document.getElementById('zoomInBtn');
        const zoomOutBtn = document.getElementById('zoomOutBtn');
        const resetZoomBtn = document.getElementById('resetZoomBtn');
        const currentFileInfo = document.getElementById('currentFileInfo');
        const clearAllBtn = document.getElementById('clearAllBtn');
        const searchType = document.getElementById('searchType');
        const loadingMsg = document.getElementById('loadingMsg');

        // Load saved files from localStorage
        function loadFilesFromStorage() {
            const saved = localStorage.getItem('pdf_reader_files_data');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    files = parsed.map(f => ({
                        ...f,
                        data: f.data ? new Uint8Array(f.data).buffer : null
                    }));
                } catch(e) { files = []; }
            }
            if (!files.length) {
                // Add a demo info file
                files.push({
                    id: 'demo_' + Date.now(),
                    name: 'Contoh_PDF.pdf',
                    data: null,
                    isDemo: true,
                    createdAt: new Date().toISOString()
                });
                saveFilesToStorage();
            }
            renderFileList();
        }

        function saveFilesToStorage() {
            const toSave = files.map(f => ({
                id: f.id,
                name: f.name,
                data: f.data ? Array.from(new Uint8Array(f.data)) : null,
                isDemo: f.isDemo,
                createdAt: f.createdAt
            }));
            localStorage.setItem('pdf_reader_files_data', JSON.stringify(toSave));
        }

        async function renderFileList() {
            if (files.length === 0) {
                fileListDiv.innerHTML = '<div style="color:#7f8c8d; text-align:center; padding:20px;">No files saved</div>';
                return;
            }
            
            fileListDiv.innerHTML = '';
            for (const file of files) {
                const div = document.createElement('div');
                div.className = 'file-item';
                if (currentFileId === file.id) div.classList.add('active');
                
                const nameSpan = document.createElement('span');
                nameSpan.className = 'file-name';
                nameSpan.textContent = file.name.length > 25 ? file.name.substring(0, 22) + '...' : file.name;
                nameSpan.title = file.name;
                
                const delBtn = document.createElement('button');
                delBtn.textContent = '🗑';
                delBtn.className = 'delete-file';
                delBtn.title = 'Delete file';
                delBtn.onclick = async (e) => {
                    e.stopPropagation();
                    await deleteFile(file.id);
                };
                
                div.appendChild(nameSpan);
                div.appendChild(delBtn);
                div.onclick = () => loadFile(file.id);
                fileListDiv.appendChild(div);
            }
        }

        async function deleteFile(fileId) {
            if (files.length <= 1) {
                alert("Cannot delete the last file. Upload a new file first.");
                return;
            }
            files = files.filter(f => f.id !== fileId);
            if (currentFileId === fileId) {
                currentFileId = null;
                currentPdfDoc = null;
                currentPages = [];
                pdfWrapper.innerHTML = '<div class="loading">Select a file to view</div>';
                currentFileInfo.textContent = 'No file loaded';
            }
            saveFilesToStorage();
            await renderFileList();
            clearHighlights();
        }

        async function loadFile(fileId) {
            const file = files.find(f => f.id === fileId);
            if (!file) return;
            
            currentFileId = file.id;
            currentFileInfo.textContent = `📄 ${file.name}`;
            
            pdfWrapper.innerHTML = '<div class="loading">Loading PDF...</div>';
            
            if (file.isDemo || !file.data) {
                pdfWrapper.innerHTML = '<div class="loading">Demo file - Upload a PDF to view content</div>';
                currentPdfDoc = null;
                currentPages = [];
                return;
            }
            
            try {
                const typedArray = new Uint8Array(file.data);
                currentPdfDoc = await pdfjsLib.getDocument({ data: typedArray }).promise;
                await renderAllPages();
                await renderFileList();
                clearSearch();
            } catch(e) {
                console.error(e);
                pdfWrapper.innerHTML = `<div class="loading">Error loading PDF: ${e.message}</div>`;
            }
        }

        async function renderAllPages() {
            if (!currentPdfDoc) return;
            
            pdfWrapper.innerHTML = '';
            currentPages = [];
            
            const numPages = currentPdfDoc.numPages;
            const scale = zoom;
            
            for (let i = 1; i <= numPages; i++) {
                const page = await currentPdfDoc.getPage(i);
                const viewport = page.getViewport({ scale: scale });
                
                const pageDiv = document.createElement('div');
                pageDiv.className = 'pdf-page';
                pageDiv.style.position = 'relative';
                pageDiv.style.width = viewport.width + 'px';
                pageDiv.style.height = viewport.height + 'px';
                
                const canvas = document.createElement('canvas');
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                const context = canvas.getContext('2d');
                
                const renderContext = {
                    canvasContext: context,
                    viewport: viewport
                };
                
                await page.render(renderContext).promise;
                
                const highlightLayer = document.createElement('div');
                highlightLayer.className = 'highlight-layer';
                highlightLayer.style.position = 'absolute';
                highlightLayer.style.top = '0';
                highlightLayer.style.left = '0';
                highlightLayer.style.width = viewport.width + 'px';
                highlightLayer.style.height = viewport.height + 'px';
                highlightLayer.style.pointerEvents = 'none';
                
                pageDiv.appendChild(canvas);
                pageDiv.appendChild(highlightLayer);
                pdfWrapper.appendChild(pageDiv);
                
                currentPages.push({
                    div: pageDiv,
                    canvas: canvas,
                    highlightLayer: highlightLayer,
                    pageIndex: i,
                    viewport: viewport,
                    page: page
                });
            }
        }

        async function reRenderWithZoom() {
            if (!currentPdfDoc) return;
            
            for (const pageData of currentPages) {
                const scale = zoom;
                const viewport = pageData.page.getViewport({ scale: scale });
                
                pageData.div.style.width = viewport.width + 'px';
                pageData.div.style.height = viewport.height + 'px';
                pageData.canvas.width = viewport.width;
                pageData.canvas.height = viewport.height;
                pageData.highlightLayer.style.width = viewport.width + 'px';
                pageData.highlightLayer.style.height = viewport.height + 'px';
                
                const renderContext = {
                    canvasContext: pageData.canvas.getContext('2d'),
                    viewport: viewport
                };
                await pageData.page.render(renderContext).promise;
                
                // Re-apply highlights if any
                if (currentMatches.length > 0) {
                    await applyHighlightsToPage(pageData);
                }
            }
        }

        function updateZoomDisplay() {
            document.getElementById('zoomLevel').textContent = `${Math.round(zoom * 100)}%`;
        }

        async function zoomIn() {
            zoom = Math.min(zoom + 0.2, 3);
            updateZoomDisplay();
            await reRenderWithZoom();
        }

        async function zoomOut() {
            zoom = Math.max(zoom - 0.2, 0.5);
            updateZoomDisplay();
            await reRenderWithZoom();
        }

        async function resetZoom() {
            zoom = 1.0;
            updateZoomDisplay();
            await reRenderWithZoom();
        }

        function clearHighlights() {
            currentMatches = [];
            currentMatchIndex = -1;
            searchCounter.textContent = '0/0';
            
            for (const pageData of currentPages) {
                if (pageData.highlightLayer) {
                    pageData.highlightLayer.innerHTML = '';
                }
            }
        }

        async function performSearch() {
            clearHighlights();
            const searchTerm = searchInput.value.trim();
            if (!searchTerm || !currentPdfDoc) {
                searchCounter.textContent = '0/0';
                return;
            }
            
            const caseSensitive = searchType.value === 'case';
            currentMatches = [];
            
            for (const pageData of currentPages) {
                const textContent = await pageData.page.getTextContent();
                const textItems = textContent.items;
                
                for (const item of textItems) {
                    const text = item.str;
                    let matchText = text;
                    let searchText = searchTerm;
                    
                    if (!caseSensitive) {
                        matchText = text.toLowerCase();
                        searchText = searchTerm.toLowerCase();
                    }
                    
                    let index = matchText.indexOf(searchText);
                    while (index !== -1) {
                        const transform = item.transform;
                        const x = transform[4];
                        const y = pageData.viewport.height - transform[5];
                        const width = 0;
                        const height = 0;
                        
                        // Estimate character width
                        const charWidth = (item.width / text.length) || 8;
                        const matchX = x + (index * charWidth);
                        const matchWidth = searchTerm.length * charWidth;
                        
                        currentMatches.push({
                            pageData: pageData,
                            x: matchX,
                            y: y - 12, // Adjust for font baseline
                            width: matchWidth,
                            height: 14,
                            text: text.substring(index, index + searchTerm.length)
                        });
                        
                        index = matchText.indexOf(searchText, index + 1);
                    }
                }
            }
            
            // Apply highlights
            for (const match of currentMatches) {
                await addHighlightToPage(match.pageData, match.x, match.y, match.width, match.height, false);
            }
            
            if (currentMatches.length > 0) {
                currentMatchIndex = 0;
                updateCurrentHighlight();
                scrollToMatch();
            } else {
                searchCounter.textContent = '0/0';
                alert('No matches found');
            }
        }
        
        async function addHighlightToPage(pageData, x, y, width, height, isCurrent) {
            const svgNS = "http://www.w3.org/2000/svg";
            const svg = document.createElementNS(svgNS, "svg");
            svg.setAttribute("width", pageData.viewport.width);
            svg.setAttribute("height", pageData.viewport.height);
            svg.style.position = "absolute";
            svg.style.top = "0";
            svg.style.left = "0";
            svg.style.pointerEvents = "none";
            
            const rect = document.createElementNS(svgNS, "rect");
            rect.setAttribute("x", Math.max(0, x));
            rect.setAttribute("y", Math.max(0, y));
            rect.setAttribute("width", width);
            rect.setAttribute("height", height);
            rect.setAttribute("class", isCurrent ? "highlight-current" : "highlight");
            rect.style.fill = isCurrent ? "orange" : "yellow";
            rect.style.fillOpacity = "0.6";
            
            svg.appendChild(rect);
            pageData.highlightLayer.innerHTML = '';
            pageData.highlightLayer.appendChild(svg);
        }
        
        async function applyHighlightsToPage(pageData) {
            const matchesOnPage = currentMatches.filter(m => m.pageData === pageData);
            if (matchesOnPage.length === 0) return;
            
            const svgNS = "http://www.w3.org/2000/svg";
            const svg = document.createElementNS(svgNS, "svg");
            svg.setAttribute("width", pageData.viewport.width);
            svg.setAttribute("height", pageData.viewport.height);
            svg.style.position = "absolute";
            svg.style.top = "0";
            svg.style.left = "0";
            svg.style.pointerEvents = "none";
            
            for (let i = 0; i < matchesOnPage.length; i++) {
                const match = matchesOnPage[i];
                const isCurrent = currentMatches[currentMatchIndex] === match;
                const rect = document.createElementNS(svgNS, "rect");
                rect.setAttribute("x", Math.max(0, match.x));
                rect.setAttribute("y", Math.max(0, match.y));
                rect.setAttribute("width", match.width);
                rect.setAttribute("height", match.height);
                rect.style.fill = isCurrent ? "orange" : "yellow";
                rect.style.fillOpacity = "0.6";
                svg.appendChild(rect);
            }
            
            pageData.highlightLayer.innerHTML = '';
            pageData.highlightLayer.appendChild(svg);
        }
        
        function updateCurrentHighlight() {
            for (const pageData of currentPages) {
                applyHighlightsToPage(pageData);
            }
            searchCounter.textContent = currentMatches.length > 0 ? 
                `${currentMatchIndex + 1}/${currentMatches.length}` : '0/0';
        }
        
        function scrollToMatch() {
            if (currentMatches[currentMatchIndex]) {
                const match = currentMatches[currentMatchIndex];
                const pageDiv = match.pageData.div;
                pageDiv.scrollIntoView({
                    behavior: 'smooth',
                    block: 'center'
                });
            }
        }
        
        function nextMatch() {
            if (currentMatches.length === 0) return;
            currentMatchIndex = (currentMatchIndex + 1) % currentMatches.length;
            updateCurrentHighlight();
            scrollToMatch();
        }
        
        function prevMatch() {
            if (currentMatches.length === 0) return;
            currentMatchIndex = (currentMatchIndex - 1 + currentMatches.length) % currentMatches.length;
            updateCurrentHighlight();
            scrollToMatch();
        }
        
        function clearSearch() {
            searchInput.value = '';
            clearHighlights();
        }
        
        async function uploadNewFile() {
            fileInput.click();
        }
        
        async function handleFileUpload(e) {
            const file = e.target.files[0];
            if (!file || !file.name.toLowerCase().endsWith('.pdf')) {
                alert('Please upload a PDF file');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = async function(evt) {
                const arrayBuffer = evt.target.result;
                const newFile = {
                    id: Date.now() + '_' + Math.random(),
                    name: file.name,
                    data: arrayBuffer,
                    isDemo: false,
                    createdAt: new Date().toISOString()
                };
                files.push(newFile);
                saveFilesToStorage();
                await renderFileList();
                await loadFile(newFile.id);
            };
            reader.readAsArrayBuffer(file);
            fileInput.value = '';
        }
        
        async function clearAllFiles() {
            if (confirm('Are you sure you want to delete ALL files? This cannot be undone.')) {
                files = [];
                saveFilesToStorage();
                await renderFileList();
                currentFileId = null;
                currentPdfDoc = null;
                currentPages = [];
                pdfWrapper.innerHTML = '<div class="loading">No files. Upload a PDF to start.</div>';
                currentFileInfo.textContent = 'No file loaded';
            }
        }
        
        // Pinch zoom gesture
        let initialDistance = 0;
        let initialZoom = 1;
        
        pdfWrapper.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                initialDistance = Math.hypot(dx, dy);
                initialZoom = zoom;
                e.preventDefault();
            }
        });
        
        pdfWrapper.addEventListener('touchmove', async (e) => {
            if (e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                const distance = Math.hypot(dx, dy);
                if (initialDistance > 0) {
                    const scale = distance / initialDistance;
                    let newZoom = initialZoom * scale;
                    newZoom = Math.min(Math.max(newZoom, 0.5), 3);
                    if (newZoom !== zoom) {
                        zoom = newZoom;
                        updateZoomDisplay();
                        await reRenderWithZoom();
                    }
                }
                e.preventDefault();
            }
        });
        
        // Event listeners
        uploadBtn.addEventListener('click', uploadNewFile);
        fileInput.addEventListener('change', handleFileUpload);
        searchBtn.addEventListener('click', performSearch);
        prevBtn.addEventListener('click', prevMatch);
        nextBtn.addEventListener('click', nextMatch);
        zoomInBtn.addEventListener('click', zoomIn);
        zoomOutBtn.addEventListener('click', zoomOut);
        resetZoomBtn.addEventListener('click', resetZoom);
        clearAllBtn.addEventListener('click', clearAllFiles);
        
        // Initialize
        loadFilesFromStorage().then(() => {
            if (files.length > 0 && files[0].data) {
                loadFile(files[0].id);
            }
        });
    </script>
</body>
</html>
