<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>DocuMind Vault - HD Reader</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e4a6e">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>

    <style>
        :root { --primary: #1e4a6e; --bg: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Header & Search Bar */
        .app-bar { background: white; padding: 10px 15px; display: flex; align-items: center; justify-content: space-between; gap: 10px; z-index: 100; border-bottom: 1px solid #e2e8f0; }
        .logo-icon img { width: 30px; height: 30px; border-radius: 6px; }
        
        .search-box { flex: 1; display: flex; align-items: center; background: #f1f5f9; padding: 6px 12px; border-radius: 50px; border: 1px solid #cbd5e1; }
        .search-box input { flex: 1; border: none; background: transparent; outline: none; font-size: 14px; min-width: 50px; }
        .search-box button { border:none; background:none; color: #64748b; padding: 0 5px; cursor: pointer; }
        .search-box button:hover { color: var(--primary); }

        /* Viewer */
        .main-layout { flex: 1; display: flex; overflow: hidden; position: relative; }
        .sidebar { width: 260px; background: white; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; transition: 0.3s; position: absolute; left: -260px; top: 0; bottom: 0; z-index: 200; }
        .sidebar.active { left: 0; }
        .sidebar-header { padding: 15px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; }
        .file-list { flex: 1; overflow-y: auto; padding: 10px; }
        .file-card { background: #fff; border: 1px solid #e2e8f0; padding: 10px; border-radius: 12px; margin-bottom: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        
        .viewer-container { flex: 1; overflow: auto; background: #525659; display: flex; flex-direction: column; align-items: center; padding: 15px; }
        .page-wrapper { position: relative; background: white; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 100%; max-width: 800px; min-height: 600px; display: flex; justify-content: center; }
        canvas { display: block; max-width: 100%; height: auto; }
        
        .fab-group { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 300; }
        .fab { width: 50px; height: 50px; border-radius: 50%; border: none; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; }
        .btn-add { background: var(--primary); }
        .btn-lib { background: #64748b; }
        #loading { position: fixed; inset: 0; background: rgba(0,0,0,0.7); color: white; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
    </style>
</head>
<body>

<div id="loading"><i class="fas fa-spinner fa-spin fa-2x"></i><p style="margin-top:10px">Mengindeks Dokumen...</p></div>

<header class="app-bar">
    <div class="logo-icon"><img src="109631.png" alt="Logo"></div>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Cari kata...">
        <button id="clearBtn" onclick="clearSearch()" style="display:none;"><i class="fas fa-times"></i></button>
        <span id="matchStatus" style="font-size:11px; font-weight:700; margin: 0 5px; color:#64748b;">0/0</span>
        <button onclick="navSearch(-1)"><i class="fas fa-chevron-up"></i></button>
        <button onclick="navSearch(1)"><i class="fas fa-chevron-down"></i></button>
    </div>
</header>

<div class="main-layout">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header"><strong>Pustaka</strong><button onclick="toggleSidebar()" style="border:none; background:none;"><i class="fas fa-times"></i></button></div>
        <div class="file-list" id="fileList"></div>
    </aside>
    <main class="viewer-container" id="viewer"></main>
</div>

<div class="fab-group">
    <button class="fab btn-lib" onclick="toggleSidebar()"><i class="fas fa-folder"></i></button>
    <button class="fab btn-add" onclick="document.getElementById('fileInput').click()"><i class="fas fa-plus"></i></button>
</div>
<input type="file" id="fileInput" hidden accept=".pdf,.docx">

<script>
    const pdfjs = window['pdfjs-dist/build/pdf'];
    pdfjs.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    let dbFiles = JSON.parse(localStorage.getItem('docu_vault_v4') || '[]');
    let searchIndex = []; 
    let currentMatches = [];

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }

    // Pencarian & Tombol Hapus
    const searchInput = document.getElementById('searchInput');
    const clearBtn = document.getElementById('clearBtn');

    searchInput.oninput = function() {
        const query = this.value.toLowerCase();
        clearBtn.style.display = query.length > 0 ? 'block' : 'none';
        
        currentMatches = [];
        if(query.length < 2) {
            document.getElementById('matchStatus').innerText = '0/0';
            return;
        }

        searchIndex.forEach(item => {
            if(item.text.includes(query)) currentMatches.push(item.page);
        });
        
        document.getElementById('matchStatus').innerText = `0/${currentMatches.length}`;
        if(currentMatches.length > 0) jumpToPage(currentMatches[0]);
    };

    function clearSearch() {
        searchInput.value = '';
        currentMatches = [];
        document.getElementById('matchStatus').innerText = '0/0';
        clearBtn.style.display = 'none';
        searchInput.focus();
    }

    // Fungsi jumpToPage dan lainnya tetap sama...
    async function displayFile(id) {
        const file = dbFiles.find(f => f.id === id);
        if(!file) return;
        const loader = document.getElementById('loading');
        const viewer = document.getElementById('viewer');
        loader.style.display = 'flex';
        viewer.innerHTML = '';
        searchIndex = [];

        const bytes = new Uint8Array(atob(file.data).split("").map(c => c.charCodeAt(0)));
        const pdf = await pdfjs.getDocument({data: bytes.buffer}).promise;

        for(let i=1; i<=pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const content = await page.getTextContent();
            const text = content.items.map(item => item.str).join(' ');
            searchIndex.push({ page: i, text: text.toLowerCase() });
            
            const wrapper = document.createElement('div');
            wrapper.className = 'page-wrapper';
            wrapper.dataset.page = i;
            viewer.appendChild(wrapper);
        }

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting && !entry.target.classList.contains('rendered')) {
                    renderPage(pdf, parseInt(entry.target.dataset.page), entry.target);
                    entry.target.classList.add('rendered');
                }
            });
        }, { rootMargin: '500px' });

        document.querySelectorAll('.page-wrapper').forEach(w => observer.observe(w));
        loader.style.display = 'none';
    }

    async function renderPage(pdf, pageNum, container) {
        const page = await pdf.getPage(pageNum);
        const viewport = page.getViewport({scale: 1.5});
        const canvas = document.createElement('canvas');
        canvas.height = viewport.height;
        canvas.width = viewport.width;
        container.appendChild(canvas);
        await page.render({canvasContext: canvas.getContext('2d'), viewport}).promise;
    }

    function navSearch(dir) {
        if(!currentMatches.length) return;
        const renderedPages = Array.from(document.querySelectorAll('.page-wrapper.rendered')).map(p => parseInt(p.dataset.page));
        const currentInView = renderedPages.length > 0 ? renderedPages[0] : 1;
        
        let nextIdx = 0;
        const found = currentMatches.findIndex(p => p >= currentInView);
        if(found !== -1) nextIdx = (found + (dir > 0 ? 0 : -1) + currentMatches.length) % currentMatches.length;
        
        jumpToPage(currentMatches[nextIdx]);
    }

    function jumpToPage(pageNum) {
        const target = document.querySelector(`.page-wrapper[data-page="${pageNum}"]`);
        if(target) {
            target.scrollIntoView({behavior: 'smooth', block: 'start'});
            document.getElementById('matchStatus').innerText = `${currentMatches.indexOf(pageNum)+1}/${currentMatches.length}`;
        }
    }

    // Load Library
    function renderLibrary() {
        document.getElementById('fileList').innerHTML = dbFiles.map(f => `
            <div class="file-card" onclick="displayFile('${f.id}')">
                <div style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${f.name}</div>
                <i class="fas fa-trash-alt" style="color:#f87171;" onclick="event.stopPropagation(); deleteFile('${f.id}')"></i>
            </div>
        `).join('');
    }

    function deleteFile(id) {
        dbFiles = dbFiles.filter(f => f.id !== id);
        localStorage.setItem('docu_vault_v4', JSON.stringify(dbFiles));
        renderLibrary();
        document.getElementById('viewer').innerHTML = '';
    }

    renderLibrary();
</script>
</body>
</html>
