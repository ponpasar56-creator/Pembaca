<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PDF Reader Pro - PT Mitra Setia Budi Sejahtera</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .toolbar {
            background: #16213e;
            color: white;
            padding: 8px 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
            border-bottom: 1px solid #0f3460;
            z-index: 100;
        }

        .toolbar-group {
            display: flex;
            gap: 4px;
            align-items: center;
            background: #0f3460;
            padding: 4px 8px;
            border-radius: 8px;
        }

        button {
            background: #e94560;
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            display: flex;
            gap: 4px;
        }

        .search-box input {
            flex: 1;
            padding: 8px;
            border-radius: 6px;
            border: none;
            font-size: 13px;
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .content-area {
            flex: 1;
            overflow: auto;
            background: #3a3d40;
            display: flex;
            justify-content: center;
        }

        #pdfViewer {
            transform-origin: 0 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            transition: transform 0.1s ease-out; /* Untuk animasi zoom halus */
        }

        .pdf-page-wrapper {
            position: relative;
            margin-bottom: 20px;
            background: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .text-layer {
            position: absolute;
            top: 0; left: 0;
            pointer-events: none;
            color: transparent;
            white-space: pre;
            line-height: 1;
        }

        .highlight {
            background-color: rgba(255, 255, 0, 0.4);
            position: absolute;
            border-bottom: 2px solid orange;
            pointer-events: none;
            z-index: 10;
        }

        .highlight.current {
            background-color: rgba(255, 165, 0, 0.6);
            border: 2px solid red;
        }

        .file-sidebar {
            width: 0;
            background: #16213e;
            transition: 0.3s;
            overflow-x: hidden;
            color: white;
        }

        .file-sidebar.open { width: 250px; }

        .loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div class="loading-overlay" id="loader">Memproses...</div>

    <div class="toolbar">
        <div class="toolbar-group">
            <button onclick="document.getElementById('fileInput').click()">📁 Buka PDF</button>
            <input type="file" id="fileInput" accept=".pdf" style="display: none;">
            <button onclick="toggleSidebar()" class="secondary">📋 Daftar</button>
        </div>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Cari kata/frase (contoh: front handle)...">
            <button onclick="startSearch()">🔍</button>
            <button onclick="prevMatch()">◀</button>
            <button onclick="nextMatch()">▶</button>
            <span id="searchStatus" style="font-size: 11px; min-width: 40px; text-align: center;">0/0</span>
        </div>

        <div class="toolbar-group">
            <span id="zoomLabel">100%</span>
            <button onclick="resetZoom()">⟳</button>
        </div>
    </div>

    <div class="main-container">
        <div id="fileSidebar" class="file-sidebar">
            <div style="padding: 15px; border-bottom: 1px solid #0f3460;">
                <strong>File Tersimpan</strong>
            </div>
            <div id="fileList"></div>
        </div>

        <div class="content-area" id="scrollContainer">
            <div id="pdfViewer">
                <div style="color: white; padding: 50px; text-align: center;">
                    Silakan unggah file PDF untuk memulai.
                </div>
            </div>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        let pdfDoc = null;
        let scale = 1.0;
        let visualScale = 1.0;
        let pagesData = [];
        let matches = [];
        let currentMatchIdx = -1;

        // --- PINCH ZOOM LOGIC ---
        let initialDist = 0;
        let isPinching = false;

        const scrollContainer = document.getElementById('scrollContainer');
        const pdfViewer = document.getElementById('pdfViewer');

        scrollContainer.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                isPinching = true;
                initialDist = Math.hypot(
                    e.touches[0].pageX - e.touches[1].pageX,
                    e.touches[0].pageY - e.touches[1].pageY
                );
            }
        }, { passive: false });

        scrollContainer.addEventListener('touchmove', (e) => {
            if (isPinching && e.touches.length === 2) {
                e.preventDefault();
                const dist = Math.hypot(
                    e.touches[0].pageX - e.touches[1].pageX,
                    e.touches[0].pageY - e.touches[1].pageY
                );
                
                // Kalkulasi zoom secara visual dulu agar smooth
                const delta = dist / initialDist;
                visualScale = Math.min(Math.max(scale * delta, 0.5), 3.0);
                
                pdfViewer.style.transform = `scale(${visualScale / scale})`;
                document.getElementById('zoomLabel').textContent = Math.round(visualScale * 100) + '%';
            }
        }, { passive: false });

        scrollContainer.addEventListener('touchend', (e) => {
            if (isPinching) {
                isPinching = false;
                scale = visualScale;
                pdfViewer.style.transform = `scale(1)`; // Reset transform
                renderAllPages(); // Render ulang dengan kualitas tajam
            }
        });

        // --- FILE & RENDER LOGIC ---
        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            showLoader(true);
            const arrayBuffer = await file.arrayBuffer();
            pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            await renderAllPages();
            showLoader(false);
        });

        async function renderAllPages() {
            if (!pdfDoc) return;
            pdfViewer.innerHTML = '';
            pagesData = [];

            for (let i = 1; i <= pdfDoc.numPages; i++) {
                const page = await pdfDoc.getPage(i);
                const viewport = page.getViewport({ scale: scale });

                const wrapper = document.createElement('div');
                wrapper.className = 'pdf-page-wrapper';
                wrapper.style.width = `${viewport.width}px`;
                wrapper.style.height = `${viewport.height}px`;

                const canvas = document.createElement('canvas');
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                wrapper.appendChild(canvas);

                const textLayer = document.createElement('div');
                textLayer.className = 'text-layer';
                wrapper.appendChild(textLayer);

                pdfViewer.appendChild(wrapper);

                const renderContext = { canvasContext: canvas.getContext('2d'), viewport: viewport };
                await page.render(renderContext).promise;

                // Ambil data teks untuk pencarian
                const textContent = await page.getTextContent();
                pagesData.push({
                    pageNum: i,
                    items: textContent.items,
                    viewport: viewport,
                    container: wrapper
                });
            }
            if (document.getElementById('searchInput').value) startSearch();
        }

        // --- ACCURATE SEARCH LOGIC ---
        function startSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            clearHighlights();
            matches = [];
            currentMatchIdx = -1;

            if (!query) return;

            pagesData.forEach((page, pageIdx) => {
                // Gabungkan teks untuk deteksi frase lintas blok
                let fullText = "";
                let charMap = []; // Memetakan index karakter ke object item PDF

                page.items.forEach((item) => {
                    let startIdx = fullText.length;
                    fullText += item.str + " "; 
                    for(let i=0; i <= item.str.length; i++) {
                        charMap.push(item);
                    }
                });

                let foundIdx = fullText.toLowerCase().indexOf(query);
                while (foundIdx !== -1) {
                    const item = charMap[foundIdx];
                    
                    // Buat highlight element
                    const tx = pdfjsLib.Util.transform(
                        page.viewport.transform,
                        item.transform
                    );

                    const hl = document.createElement('div');
                    hl.className = 'highlight';
                    hl.style.left = `${tx[4]}px`;
                    hl.style.top = `${tx[5] - (Math.abs(item.transform[3]) * scale)}px`;
                    hl.style.width = `${item.width * scale}px`;
                    hl.style.height = `${Math.abs(item.transform[3]) * scale}px`;
                    
                    page.container.appendChild(hl);
                    matches.push(hl);

                    foundIdx = fullText.toLowerCase().indexOf(query, foundIdx + 1);
                }
            });

            updateSearchUI();
            if (matches.length > 0) nextMatch();
        }

        function nextMatch() {
            if (matches.length === 0) return;
            if (currentMatchIdx >= 0) matches[currentMatchIdx].classList.remove('current');
            currentMatchIdx = (currentMatchIdx + 1) % matches.length;
            focusMatch();
        }

        function prevMatch() {
            if (matches.length === 0) return;
            if (currentMatchIdx >= 0) matches[currentMatchIdx].classList.remove('current');
            currentMatchIdx = (currentMatchIdx - 1 + matches.length) % matches.length;
            focusMatch();
        }

        function focusMatch() {
            const match = matches[currentMatchIdx];
            match.classList.add('current');
            match.scrollIntoView({ behavior: 'smooth', block: 'center' });
            updateSearchUI();
        }

        function updateSearchUI() {
            document.getElementById('searchStatus').textContent = 
                matches.length > 0 ? `${currentMatchIdx + 1}/${matches.length}` : "0/0";
        }

        function clearHighlights() {
            document.querySelectorAll('.highlight').forEach(el => el.remove());
        }

        function resetZoom() {
            scale = 1.0;
            visualScale = 1.0;
            document.getElementById('zoomLabel').textContent = '100%';
            renderAllPages();
        }

        function toggleSidebar() {
            document.getElementById('fileSidebar').classList.toggle('open');
        }

        function showLoader(show) {
            document.getElementById('loader').style.display = show ? 'flex' : 'none';
        }

        // Jalankan pencarian saat Enter ditekan
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') startSearch();
        });

    </script>
</body>
</html>
