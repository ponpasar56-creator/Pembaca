<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PDF Reader Pro - PT Mitra Setia Budi Sejahtera</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: pan-x pan-y;
        }

        .toolbar {
            background: #16213e;
            color: white;
            padding: 8px 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
            border-bottom: 1px solid #0f3460;
            flex-shrink: 0;
        }

        .toolbar-group {
            display: flex;
            gap: 4px;
            align-items: center;
            background: #0f3460;
            padding: 4px 8px;
            border-radius: 8px;
        }

        button {
            background: #e94560;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.15s;
            touch-action: manipulation;
        }

        button:active {
            transform: scale(0.96);
            background: #c73e56;
        }

        button.secondary {
            background: #533483;
        }

        button.secondary:active {
            background: #3d2463;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            display: flex;
            gap: 4px;
        }

        .search-box input {
            flex: 1;
            padding: 6px 10px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            background: white;
        }

        .search-box select {
            padding: 6px;
            border-radius: 6px;
            border: none;
            font-size: 11px;
            background: white;
        }

        .zoom-info {
            background: #0f3460;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
            min-width: 45px;
            text-align: center;
        }

        .file-info {
            background: #e94560;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .file-sidebar {
            width: 0;
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
            transition: width 0.25s ease;
        }

        .file-sidebar.open {
            width: 260px;
            border-right: 1px solid #0f3460;
        }

        .file-header {
            padding: 10px 12px;
            background: #0f3460;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-size: 12px;
        }

        .file-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .file-item {
            background: #16213e;
            color: white;
            padding: 8px 10px;
            margin-bottom: 6px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.15s;
            border: 1px solid #0f3460;
            font-size: 11px;
        }

        .file-item:active {
            background: #0f3460;
            transform: scale(0.98);
        }

        .file-item.active {
            background: #e94560;
            border-color: #e94560;
        }

        .file-name {
            word-break: break-all;
            flex: 1;
        }

        .delete-file {
            background: #e74c3c;
            border: none;
            color: white;
            padding: 3px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 10px;
            margin-left: 8px;
        }

        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #3a3d40;
            position: relative;
        }

        .scroll-container {
            flex: 1;
            overflow-y: auto;
            overflow-x: auto;
            position: relative;
            background: #525659;
        }

        .pdf-viewer {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            transform-origin: top center;
            will-change: transform;
        }

        .pdf-page-wrapper {
            position: relative;
            margin: 16px auto;
            background: white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            border-radius: 4px;
            overflow: hidden;
        }

        .pdf-canvas {
            display: block;
            width: 100%;
            height: auto;
        }

        .text-layer {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
            line-height: 1;
            pointer-events: none;
        }

        .text-layer span {
            position: absolute;
            white-space: pre;
            cursor: text;
            pointer-events: auto;
            transform-origin: 0% 0%;
            color: transparent;
        }

        .text-layer span.search-match {
            background-color: rgba(255, 235, 59, 0.7);
            color: transparent !important;
            border-radius: 2px;
            pointer-events: auto;
            cursor: pointer;
        }

        .text-layer span.search-match-current {
            background-color: rgba(255, 152, 0, 0.85);
            color: transparent !important;
            border-radius: 2px;
            box-shadow: 0 0 0 2px #ff9800;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: white;
            font-size: 14px;
        }

        .scroll-container::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        .scroll-container::-webkit-scrollbar-track {
            background: #2a2d30;
            border-radius: 4px;
        }
        .scroll-container::-webkit-scrollbar-thumb {
            background: #e94560;
            border-radius: 4px;
        }

        .toggle-sidebar {
            background: #533483;
            padding: 5px 10px;
            font-size: 11px;
        }

        @media (max-width: 768px) {
            .toolbar {
                padding: 6px 8px;
                gap: 4px;
            }
            button {
                padding: 5px 8px;
                font-size: 10px;
            }
            .search-box input {
                font-size: 11px;
                padding: 5px 8px;
            }
            .file-info {
                max-width: 130px;
                font-size: 10px;
            }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .searching {
            animation: pulse 0.5s ease-in-out;
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <div class="toolbar-group">
            <button id="uploadBtn" class="secondary">📁 Upload</button>
            <input type="file" id="fileInput" accept=".pdf" style="display: none;">
            <button id="toggleSidebarBtn" class="toggle-sidebar">📋 Files</button>
        </div>
        <div class="toolbar-group">
            <button id="zoomOutBtn">−</button>
            <span class="zoom-info" id="zoomLevel">100%</span>
            <button id="zoomInBtn">+</button>
            <button id="resetZoomBtn" class="secondary">⟳</button>
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Cari..." autocomplete="off">
            <select id="searchType">
                <option value="insensitive">Abc</option>
                <option value="case">Aa</option>
            </select>
            <button id="searchBtn">🔍</button>
            <button id="prevBtn" title="Previous">◀</button>
            <button id="nextBtn" title="Next">▶</button>
            <span id="searchCounter" style="font-size:10px; background:#0f3460; padding:3px 8px; border-radius:5px;">0</span>
        </div>
        <div class="file-info" id="currentFileInfo">
            No file
        </div>
    </div>

    <div class="main-container">
        <div class="file-sidebar" id="fileSidebar">
            <div class="file-header">
                <span>📄 Saved Files</span>
                <button id="clearAllBtn" style="background:#e74c3c; padding:3px 8px; font-size:10px;">Clear</button>
            </div>
            <div class="file-list" id="fileList">
                <div style="color:#888; text-align:center; padding:20px;">No files</div>
            </div>
        </div>

        <div class="content-area">
            <div class="scroll-container" id="scrollContainer">
                <div class="pdf-viewer" id="pdfViewer">
                    <div class="loading" id="loadingMsg">
                        📄 Upload PDF atau pilih file<br>
                        Support file PDF asli
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Initialize PDF.js
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        
        // App state
        let files = [];
        let currentFileId = null;
        let pdfDoc = null;
        let currentScale = 1.0;
        let allTextItems = [];
        let currentMatches = [];
        let currentMatchIndex = -1;
        let pages = [];
        let isRendering = false;
        
        // DOM elements
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const toggleSidebarBtn = document.getElementById('toggleSidebarBtn');
        const fileSidebar = document.getElementById('fileSidebar');
        const fileListDiv = document.getElementById('fileList');
        const pdfViewer = document.getElementById('pdfViewer');
        const scrollContainer = document.getElementById('scrollContainer');
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const searchCounter = document.getElementById('searchCounter');
        const zoomInBtn = document.getElementById('zoomInBtn');
        const zoomOutBtn = document.getElementById('zoomOutBtn');
        const resetZoomBtn = document.getElementById('resetZoomBtn');
        const currentFileInfo = document.getElementById('currentFileInfo');
        const clearAllBtn = document.getElementById('clearAllBtn');
        const searchType = document.getElementById('searchType');

        // Storage functions
        function loadFilesFromStorage() {
            const saved = localStorage.getItem('pdf_reader_pro');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    files = parsed.map(f => ({
                        ...f,
                        data: f.data ? new Uint8Array(f.data).buffer : null
                    }));
                } catch(e) { files = []; }
            }
            if (!files.length) files = [];
            renderFileList();
        }

        function saveFilesToStorage() {
            const toSave = files.map(f => ({
                id: f.id,
                name: f.name,
                data: f.data ? Array.from(new Uint8Array(f.data)) : null,
                createdAt: f.createdAt
            }));
            localStorage.setItem('pdf_reader_pro', JSON.stringify(toSave));
        }

        async function renderFileList() {
            if (files.length === 0) {
                fileListDiv.innerHTML = '<div style="color:#888; text-align:center; padding:20px;">No files<br>Upload PDF</div>';
                return;
            }
            
            fileListDiv.innerHTML = '';
            for (const file of files) {
                const div = document.createElement('div');
                div.className = 'file-item';
                if (currentFileId === file.id) div.classList.add('active');
                
                const nameSpan = document.createElement('span');
                nameSpan.className = 'file-name';
                nameSpan.textContent = file.name.length > 28 ? file.name.substring(0, 25) + '...' : file.name;
                nameSpan.title = file.name;
                
                const delBtn = document.createElement('button');
                delBtn.textContent = '🗑';
                delBtn.className = 'delete-file';
                delBtn.onclick = async (e) => {
                    e.stopPropagation();
                    await deleteFile(file.id);
                };
                
                div.appendChild(nameSpan);
                div.appendChild(delBtn);
                div.onclick = () => loadFile(file.id);
                fileListDiv.appendChild(div);
            }
        }

        async function deleteFile(fileId) {
            files = files.filter(f => f.id !== fileId);
            if (currentFileId === fileId) {
                currentFileId = null;
                pdfDoc = null;
                pdfViewer.innerHTML = '<div class="loading">Select a file to view</div>';
                currentFileInfo.textContent = 'No file';
                clearSearchResults();
            }
            saveFilesToStorage();
            await renderFileList();
        }

        function clearSearchResults() {
            currentMatches = [];
            currentMatchIndex = -1;
            searchCounter.textContent = '0';
            searchInput.value = '';
        }

        async function loadFile(fileId) {
            const file = files.find(f => f.id === fileId);
            if (!file || !file.data) return;
            
            currentFileId = file.id;
            currentFileInfo.textContent = `📄 ${file.name.length > 25 ? file.name.substring(0,22)+'...' : file.name}`;
            
            pdfViewer.innerHTML = '<div class="loading">Loading PDF...</div>';
            clearSearchResults();
            
            try {
                const typedArray = new Uint8Array(file.data);
                pdfDoc = await pdfjsLib.getDocument({ data: typedArray }).promise;
                await renderAllPages();
                await renderFileList();
            } catch(e) {
                console.error(e);
                pdfViewer.innerHTML = `<div class="loading">Error: ${e.message}</div>`;
            }
        }

        async function renderAllPages() {
            if (!pdfDoc) return;
            
            pdfViewer.innerHTML = '';
            pages = [];
            allTextItems = [];
            
            const numPages = pdfDoc.numPages;
            
            for (let pageNum = 1; pageNum <= numPages; pageNum++) {
                const page = await pdfDoc.getPage(pageNum);
                const viewport = page.getViewport({ scale: currentScale });
                
                // Create wrapper
                const wrapper = document.createElement('div');
                wrapper.className = 'pdf-page-wrapper';
                wrapper.style.width = viewport.width + 'px';
                wrapper.style.height = viewport.height + 'px';
                wrapper.setAttribute('data-page', pageNum);
                
                // Create canvas
                const canvas = document.createElement('canvas');
                canvas.className = 'pdf-canvas';
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                
                const context = canvas.getContext('2d');
                await page.render({ canvasContext: context, viewport: viewport }).promise;
                
                // Create text layer
                const textLayer = document.createElement('div');
                textLayer.className = 'text-layer';
                textLayer.style.width = viewport.width + 'px';
                textLayer.style.height = viewport.height + 'px';
                
                wrapper.appendChild(canvas);
                wrapper.appendChild(textLayer);
                pdfViewer.appendChild(wrapper);
                
                // Extract text content with precise positioning
                const textContent = await page.getTextContent();
                const pageTextItems = [];
                
                for (const item of textContent.items) {
                    const transform = item.transform;
                    const x = transform[4];
                    const y = viewport.height - transform[5];
                    const fontSize = Math.abs(transform[3]);
                    const text = item.str;
                    
                    if (text && text.trim()) {
                        const span = document.createElement('span');
                        span.textContent = text;
                        span.style.left = x + 'px';
                        span.style.top = (y - fontSize) + 'px';
                        span.style.fontSize = fontSize + 'px';
                        span.style.fontFamily = item.fontName || 'monospace';
                        span.setAttribute('data-text', text);
                        span.setAttribute('data-page', pageNum);
                        span.setAttribute('data-x', x);
                        span.setAttribute('data-y', y);
                        
                        textLayer.appendChild(span);
                        
                        pageTextItems.push({
                            span: span,
                            text: text,
                            x: x,
                            y: y - fontSize,
                            width: item.width,
                            height: fontSize,
                            pageNum: pageNum,
                            wrapper: wrapper
                        });
                    }
                }
                
                pages.push({
                    wrapper: wrapper,
                    textLayer: textLayer,
                    pageNum: pageNum,
                    viewport: viewport,
                    page: page,
                    textItems: pageTextItems
                });
                
                allTextItems.push(...pageTextItems);
            }
        }

        async function reRenderWithScale() {
            if (!pdfDoc || isRendering) return;
            isRendering = true;
            
            const numPages = pdfDoc.numPages;
            
            for (let i = 0; i < numPages && i < pages.length; i++) {
                const pageData = pages[i];
                const page = pageData.page;
                const viewport = page.getViewport({ scale: currentScale });
                
                // Update wrapper size
                pageData.wrapper.style.width = viewport.width + 'px';
                pageData.wrapper.style.height = viewport.height + 'px';
                
                // Update canvas
                const canvas = pageData.wrapper.querySelector('.pdf-canvas');
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                const context = canvas.getContext('2d');
                await page.render({ canvasContext: context, viewport: viewport }).promise;
                
                // Update text layer
                const textLayer = pageData.textLayer;
                textLayer.style.width = viewport.width + 'px';
                textLayer.style.height = viewport.height + 'px';
                
                // Update span positions
                const spans = textLayer.querySelectorAll('span');
                const textContent = await page.getTextContent();
                
                for (let j = 0; j < spans.length && j < textContent.items.length; j++) {
                    const item = textContent.items[j];
                    const transform = item.transform;
                    const x = transform[4] * currentScale;
                    const y = viewport.height - (transform[5] * currentScale);
                    const fontSize = Math.abs(transform[3] * currentScale);
                    
                    spans[j].style.left = x + 'px';
                    spans[j].style.top = (y - fontSize) + 'px';
                    spans[j].style.fontSize = fontSize + 'px';
                }
                
                // Update stored positions
                for (let j = 0; j < pageData.textItems.length && j < textContent.items.length; j++) {
                    const item = textContent.items[j];
                    pageData.textItems[j].x = item.transform[4] * currentScale;
                    pageData.textItems[j].y = viewport.height - (item.transform[5] * currentScale);
                    pageData.textItems[j].height = Math.abs(item.transform[3] * currentScale);
                }
            }
            
            // Re-apply highlights if any
            if (currentMatches.length > 0) {
                applyHighlights();
            }
            
            isRendering = false;
        }

        function updateZoomDisplay() {
            document.getElementById('zoomLevel').textContent = `${Math.round(currentScale * 100)}%`;
        }

        async function zoomIn() {
            currentScale = Math.min(currentScale + 0.1, 2.5);
            updateZoomDisplay();
            await reRenderWithScale();
        }

        async function zoomOut() {
            currentScale = Math.max(currentScale - 0.1, 0.5);
            updateZoomDisplay();
            await reRenderWithScale();
        }

        async function resetZoom() {
            currentScale = 1.0;
            updateZoomDisplay();
            await reRenderWithScale();
        }

        function clearHighlights() {
            for (const item of allTextItems) {
                item.span.classList.remove('search-match', 'search-match-current');
            }
        }

        function applyHighlights() {
            clearHighlights();
            for (let i = 0; i < currentMatches.length; i++) {
                const match = currentMatches[i];
                const className = (i === currentMatchIndex) ? 'search-match-current' : 'search-match';
                match.span.classList.add(className);
            }
            searchCounter.textContent = currentMatches.length;
        }

        async function performSearch() {
            const searchTerm = searchInput.value.trim();
            if (!searchTerm || !pdfDoc) {
                clearHighlights();
                currentMatches = [];
                currentMatchIndex = -1;
                searchCounter.textContent = '0';
                return;
            }
            
            // Visual feedback
            searchBtn.classList.add('searching');
            setTimeout(() => searchBtn.classList.remove('searching'), 300);
            
            const caseSensitive = searchType.value === 'case';
            const searchLower = caseSensitive ? searchTerm : searchTerm.toLowerCase();
            
            clearHighlights();
            currentMatches = [];
            
            // Search through all text items
            for (const item of allTextItems) {
                const compareText = caseSensitive ? item.text : item.text.toLowerCase();
                let startIndex = 0;
                let index;
                
                while ((index = compareText.indexOf(searchLower, startIndex)) !== -1) {
                    currentMatches.push({
                        span: item.span,
                        text: item.text,
                        startIndex: index,
                        endIndex: index + searchTerm.length,
                        pageNum: item.pageNum,
                        item: item
                    });
                    startIndex = index + 1;
                }
            }
            
            if (currentMatches.length > 0) {
                currentMatchIndex = 0;
                applyHighlights();
                scrollToMatch();
            } else {
                searchCounter.textContent = '0';
                // Visual feedback for no results
                searchInput.style.border = '2px solid #e94560';
                setTimeout(() => searchInput.style.border = '', 1000);
            }
        }

        function scrollToMatch() {
            if (currentMatches[currentMatchIndex]) {
                const match = currentMatches[currentMatchIndex];
                const span = match.span;
                span.scrollIntoView({
                    behavior: 'smooth',
                    block: 'center'
                });
            }
        }

        function nextMatch() {
            if (currentMatches.length === 0) return;
            currentMatchIndex = (currentMatchIndex + 1) % currentMatches.length;
            applyHighlights();
            scrollToMatch();
        }

        function prevMatch() {
            if (currentMatches.length === 0) return;
            currentMatchIndex = (currentMatchIndex - 1 + currentMatches.length) % currentMatches.length;
            applyHighlights();
            scrollToMatch();
        }

        // Upload file
        async function uploadNewFile() {
            fileInput.click();
        }

        async function handleFileUpload(e) {
            const file = e.target.files[0];
            if (!file || !file.name.toLowerCase().endsWith('.pdf')) {
                alert('Please upload a PDF file');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = async function(evt) {
                const arrayBuffer = evt.target.result;
                const newFile = {
                    id: Date.now() + '_' + Math.random(),
                    name: file.name,
                    data: arrayBuffer,
                    createdAt: new Date().toISOString()
                };
                files.push(newFile);
                saveFilesToStorage();
                await renderFileList();
                await loadFile(newFile.id);
            };
            reader.readAsArrayBuffer(file);
            fileInput.value = '';
        }

        async function clearAllFiles() {
            if (confirm('Delete all files? This cannot be undone.')) {
                files = [];
                saveFilesToStorage();
                await renderFileList();
                currentFileId = null;
                pdfDoc = null;
                pdfViewer.innerHTML = '<div class="loading">No files. Upload PDF to start.</div>';
                currentFileInfo.textContent = 'No file';
                clearSearchResults();
            }
        }

        // Pinch zoom with smooth animation
        let pinchStartDistance = 0;
        let pinchStartScale = 1;
        let pinchAnimationId = null;
        
        function handleTouchStart(e) {
            if (e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                pinchStartDistance = Math.hypot(dx, dy);
                pinchStartScale = currentScale;
                e.preventDefault();
            }
        }
        
        function handleTouchMove(e) {
            if (e.touches.length === 2 && pinchStartDistance > 0) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                const distance = Math.hypot(dx, dy);
                const scale = distance / pinchStartDistance;
                let newScale = pinchStartScale * scale;
                newScale = Math.min(Math.max(newScale, 0.5), 2.5);
                
                if (newScale !== currentScale) {
                    currentScale = newScale;
                    updateZoomDisplay();
                    
                    // Smooth rendering with requestAnimationFrame
                    if (pinchAnimationId) cancelAnimationFrame(pinchAnimationId);
                    pinchAnimationId = requestAnimationFrame(async () => {
                        await reRenderWithScale();
                        pinchAnimationId = null;
                    });
                }
                e.preventDefault();
            }
        }
        
        function handleTouchEnd(e) {
            pinchStartDistance = 0;
            if (pinchAnimationId) {
                cancelAnimationFrame(pinchAnimationId);
                pinchAnimationId = null;
            }
        }

        // Event listeners
        uploadBtn.addEventListener('click', uploadNewFile);
        fileInput.addEventListener('change', handleFileUpload);
        toggleSidebarBtn.addEventListener('click', () => fileSidebar.classList.toggle('open'));
        searchBtn.addEventListener('click', performSearch);
        prevBtn.addEventListener('click', prevMatch);
        nextBtn.addEventListener('click', nextMatch);
        zoomInBtn.addEventListener('click', zoomIn);
        zoomOutBtn.addEventListener('click', zoomOut);
        resetZoomBtn.addEventListener('click', resetZoom);
        clearAllBtn.addEventListener('click', clearAllFiles);
        
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performSearch();
        });
        
        // Touch events for pinch zoom
        pdfViewer.addEventListener('touchstart', handleTouchStart, { passive: false });
        pdfViewer.addEventListener('touchmove', handleTouchMove, { passive: false });
        pdfViewer.addEventListener('touchend', handleTouchEnd);
        
        // Initialize
        loadFilesFromStorage();
        
        // Auto-hide sidebar on mobile
        if (window.innerWidth <= 768) {
            fileSidebar.classList.remove('open');
        }
        
        // Log that app is ready
        console.log('PDF Reader Pro ready - supports accurate text search');
    </script>
</body>
</html>
