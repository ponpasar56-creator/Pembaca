<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PDF Reader - PT Mitra Setia Budi Sejahtera</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #2c3e50;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Toolbar */
        .toolbar {
            background: #34495e;
            color: white;
            padding: 10px 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            border-bottom: 2px solid #2c3e50;
            flex-shrink: 0;
        }

        .toolbar-group {
            display: flex;
            gap: 5px;
            align-items: center;
            background: #2c3e50;
            padding: 5px 10px;
            border-radius: 8px;
        }

        button {
            background: #1abc9c;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        button:hover {
            background: #16a085;
            transform: scale(1.02);
        }

        button.danger {
            background: #e74c3c;
        }

        button.danger:hover {
            background: #c0392b;
        }

        button.primary {
            background: #3498db;
        }

        button.primary:hover {
            background: #2980b9;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            display: flex;
            gap: 5px;
        }

        .search-box input {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
        }

        .search-box select {
            padding: 8px;
            border-radius: 5px;
            border: none;
        }

        .zoom-info {
            background: #2c3e50;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
        }

        .file-info {
            background: #1abc9c;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        /* Main container */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* File list sidebar */
        .file-sidebar {
            width: 260px;
            background: #ecf0f1;
            border-right: 1px solid #bdc3c7;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
        }

        .file-header {
            padding: 12px;
            background: #bdc3c7;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .file-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .file-item {
            background: white;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
            border: 1px solid #ddd;
        }

        .file-item:hover {
            background: #d5f5e3;
            transform: translateX(3px);
        }

        .file-item.active {
            background: #1abc9c;
            color: white;
            border-color: #1abc9c;
        }

        .file-name {
            font-size: 13px;
            word-break: break-all;
            flex: 1;
        }

        .delete-file {
            background: #e74c3c;
            border: none;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            margin-left: 8px;
        }

        .delete-file:hover {
            background: #c0392b;
        }

        /* Content area */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #f5f6fa;
        }

        /* Scroll container */
        .scroll-container {
            flex: 1;
            overflow-y: auto;
            overflow-x: auto;
            position: relative;
            background: #e0e0e0;
        }

        /* PDF content wrapper for zoom */
        .pdf-wrapper {
            transform-origin: top left;
            transition: transform 0.1s ease;
            padding: 20px;
        }

        /* PDF content styling */
        .pdf-content {
            background: white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            margin: 0 auto;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            line-height: 1.4;
            white-space: pre-wrap;
            word-wrap: break-word;
            padding: 20px;
        }

        /* Highlight search results */
        .highlight {
            background-color: #ffeb3b;
            color: black;
        }

        .highlight-current {
            background-color: #ff9800;
            color: white;
        }

        /* Table styling */
        .pdf-content table {
            border-collapse: collapse;
            width: 100%;
            margin: 10px 0;
            font-size: 10px;
        }

        .pdf-content th, .pdf-content td {
            border: 1px solid #ddd;
            padding: 6px;
            text-align: left;
            vertical-align: top;
        }

        .pdf-content th {
            background: #f0f0f0;
            font-weight: bold;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .file-sidebar {
                width: 200px;
            }
            .toolbar {
                padding: 8px;
            }
            button {
                padding: 5px 10px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <div class="toolbar-group">
            <button id="uploadBtn" class="primary">📁 Upload PDF</button>
            <input type="file" id="fileInput" accept=".txt,.html" style="display: none;">
        </div>
        <div class="toolbar-group">
            <button id="zoomOutBtn">🔍− Zoom Out</button>
            <span class="zoom-info" id="zoomLevel">100%</span>
            <button id="zoomInBtn">🔍+ Zoom In</button>
            <button id="resetZoomBtn">⟳ Reset</button>
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Cari di dokumen...">
            <select id="searchType">
                <option value="exact">Exact Match</option>
                <option value="case">Case Sensitive</option>
                <option value="regex">Regex</option>
            </select>
            <button id="searchBtn">🔍 Cari</button>
            <button id="prevBtn" title="Previous">◀</button>
            <button id="nextBtn" title="Next">▶</button>
            <span id="searchCounter" style="font-size:12px;">0/0</span>
        </div>
        <div class="file-info" id="currentFileInfo">
            No file loaded
        </div>
    </div>

    <div class="main-container">
        <div class="file-sidebar">
            <div class="file-header">
                <span>📄 Saved Files</span>
                <button id="clearAllBtn" class="danger" style="padding:4px 8px; font-size:11px;">Clear All</button>
            </div>
            <div class="file-list" id="fileList">
                <div style="color:#7f8c8d; text-align:center; padding:20px;">No files saved</div>
            </div>
        </div>

        <div class="content-area">
            <div class="scroll-container" id="scrollContainer">
                <div class="pdf-wrapper" id="pdfWrapper">
                    <div class="pdf-content" id="pdfContent">
                        <p style="text-align:center; color:#7f8c8d; padding:50px;">
                            👈 Upload atau pilih file PDF di sebelah kiri<br>
                            Support: .txt, .html (hasil konversi PDF)
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Data storage
        let files = [];
        let currentFileId = null;
        let currentContent = '';
        let zoom = 1.0;
        let currentMatches = [];
        let currentMatchIndex = -1;
        
        // DOM elements
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const fileListDiv = document.getElementById('fileList');
        const pdfContent = document.getElementById('pdfContent');
        const pdfWrapper = document.getElementById('pdfWrapper');
        const scrollContainer = document.getElementById('scrollContainer');
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const searchCounter = document.getElementById('searchCounter');
        const zoomInBtn = document.getElementById('zoomInBtn');
        const zoomOutBtn = document.getElementById('zoomOutBtn');
        const resetZoomBtn = document.getElementById('resetZoomBtn');
        const currentFileInfo = document.getElementById('currentFileInfo');
        const clearAllBtn = document.getElementById('clearAllBtn');
        const searchType = document.getElementById('searchType');

        // Load saved files from localStorage
        function loadFilesFromStorage() {
            const saved = localStorage.getItem('pdf_reader_files');
            if (saved) {
                try {
                    files = JSON.parse(saved);
                } catch(e) { files = []; }
            }
            if (!files.length) {
                // Add default file from the PDF content
                addDefaultFile();
            }
            renderFileList();
        }

        // Add default file from the PDF data
        function addDefaultFile() {
            // Extract text content from the PDF file data embedded
            const defaultContent = `===== Page 1 =====

 PT Mitra Setia Budi Sejahtera  Main Distributor Motorcycle Parts  Satelite Town Square A-33, Jl. Raya Sukomanuggal Jaya, Surabaya 60188  Phone. 031-738 4858 / 0811 333 8979, Fax. 031-738 4859  e-mail : vr_msbs@yahoo.com

PRODUK BARU:
1. TIRE SEALANT / ANTI BAN BOCOR 350 ML - PC 24 - Rp20,000
2. BOX BAGASI BEAT 24 / BEAT STREET 24 - PC 6 - Rp92,000
3. BOX BAGASI VARIO 160 - PC 4 - Rp114,500
4. COVER FILTER UDARA SCOOPY 20 / BEAT 24 - PC 10 - Rp26,500
5. COVER SPEEDOMETER BEAT 24 HITAM - PC 10 - Rp73,500
... (Lengkap dengan semua parts dari file asli)

HONDA COMPLETE SET BODY:
- Complete Set Body Absolute Revo Fit Hitam - ST 1 - Rp631,000
- Complete Set Body Absolute Revo Hitam - ST 1 - Rp798,000
- Complete Set Body Beat 10 Hitam - ST 1 - Rp775,000
- Complete Set Body Beat 20 Hitam - ST 1 - Rp1,127,000
- Complete Set Body Beat FI Hitam - ST 1 - Rp908,000
- Complete Set Body Karisma X Hitam - ST 1 - Rp812,000
- Complete Set Body Revo FI Hitam - ST 1 - Rp901,000
- Complete Set Body Scoopy 20 Hitam - ST 1 - Rp2,010,000
- Complete Set Body Scoopy FI Hitam - ST 1 - Rp1,596,000
- Complete Set Body Supra FI Hitam - ST 1 - Rp706,000
- Complete Set Body Vario 110 FI Hitam - ST 1 - Rp947,000
- Complete Set Body Vario 125 23 Hitam - ST 1 - Rp1,774,000
- Complete Set Body Vario 150 Hitam - ST 1 - Rp1,345,000

LEGSHIELD LUAR (HONDA):
- Legshield Luar Absolute Revo Hitam - PC 20 - Rp128,500
- Legshield Luar Scoopy 20 Hitam - PC 15 - Rp187,000
- Legshield Luar Vario 160 Besar Hitam - PC 5 - Rp187,000

Harga berlaku mulai 16 April 2026. Harga dapat berubah sewaktu-waktu tanpa pemberitahuan terlebih dahulu.

Surabaya, 16 April 2026
Christina Harli
Marketing Director`;

            const defaultFile = {
                id: 'default_' + Date.now(),
                name: 'PL_VR_16_April_2026.txt',
                content: defaultContent,
                createdAt: new Date().toISOString()
            };
            
            const exists = files.some(f => f.name === defaultFile.name);
            if (!exists) {
                files.unshift(defaultFile);
                saveFilesToStorage();
            }
        }

        function saveFilesToStorage() {
            localStorage.setItem('pdf_reader_files', JSON.stringify(files));
        }

        function renderFileList() {
            if (files.length === 0) {
                fileListDiv.innerHTML = '<div style="color:#7f8c8d; text-align:center; padding:20px;">No files saved</div>';
                return;
            }
            
            fileListDiv.innerHTML = '';
            files.forEach(file => {
                const div = document.createElement('div');
                div.className = 'file-item';
                if (currentFileId === file.id) div.classList.add('active');
                
                const nameSpan = document.createElement('span');
                nameSpan.className = 'file-name';
                nameSpan.textContent = file.name.length > 25 ? file.name.substring(0, 22) + '...' : file.name;
                nameSpan.title = file.name;
                
                const delBtn = document.createElement('button');
                delBtn.textContent = '🗑';
                delBtn.className = 'delete-file';
                delBtn.title = 'Delete file';
                delBtn.onclick = (e) => {
                    e.stopPropagation();
                    deleteFile(file.id);
                };
                
                div.appendChild(nameSpan);
                div.appendChild(delBtn);
                div.onclick = () => loadFile(file.id);
                fileListDiv.appendChild(div);
            });
        }

        function deleteFile(fileId) {
            if (files.length <= 1) {
                alert("Cannot delete the last file. Upload a new file first.");
                return;
            }
            files = files.filter(f => f.id !== fileId);
            if (currentFileId === fileId) {
                currentFileId = null;
                currentContent = '';
                pdfContent.innerHTML = '<p style="text-align:center; color:#7f8c8d; padding:50px;">Select a file to view</p>';
                currentFileInfo.textContent = 'No file loaded';
            }
            saveFilesToStorage();
            renderFileList();
            clearHighlights();
        }

        function loadFile(fileId) {
            const file = files.find(f => f.id === fileId);
            if (!file) return;
            
            currentFileId = file.id;
            currentContent = file.content;
            currentFileInfo.textContent = `📄 ${file.name}`;
            
            renderContent();
            renderFileList();
            clearSearch();
        }

        function renderContent() {
            // Escape HTML untuk tampilan aman
            let htmlContent = currentContent
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/\n/g, '<br>');
            
            // Deteksi dan format tabel sederhana
            // Convert tab-separated or space-separated tables to HTML tables for better readability
            const lines = currentContent.split('\n');
            let inTable = false;
            let tableRows = [];
            let formattedLines = [];
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                // Check if line looks like table row (has multiple pipe or tab separated values)
                if (line.includes('|') && line.split('|').length > 2) {
                    if (!inTable) {
                        if (tableRows.length > 0) formattedLines.push(renderTable(tableRows));
                        tableRows = [];
                        inTable = true;
                    }
                    tableRows.push(line);
                } else if (line.trim().startsWith('===') && line.includes('====')) {
                    if (tableRows.length > 0) {
                        formattedLines.push(renderTable(tableRows));
                        tableRows = [];
                    }
                    inTable = false;
                    formattedLines.push('<hr style="margin:10px 0; border:1px solid #ccc;">');
                    formattedLines.push('<strong style="background:#f0f0f0; padding:5px; display:block;">' + escapeHtml(line) + '</strong>');
                } else {
                    if (tableRows.length > 0) {
                        formattedLines.push(renderTable(tableRows));
                        tableRows = [];
                    }
                    inTable = false;
                    if (line.trim() === '') {
                        formattedLines.push('<br>');
                    } else if (line.match(/^\d+\./)) {
                        formattedLines.push('<div style="margin:5px 0;">' + escapeHtml(line) + '</div>');
                    } else {
                        formattedLines.push('<div style="margin:2px 0;">' + escapeHtml(line) + '</div>');
                    }
                }
            }
            if (tableRows.length > 0) {
                formattedLines.push(renderTable(tableRows));
            }
            
            pdfContent.innerHTML = formattedLines.join('');
            applyZoom();
        }
        
        function escapeHtml(text) {
            return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }
        
        function renderTable(rows) {
            let tableHtml = '<table style="border-collapse:collapse; width:100%; margin:10px 0; font-size:10px;">';
            for (let row of rows) {
                let cells = row.split('|').filter(c => c.trim() !== '');
                if (cells.length === 0) continue;
                tableHtml += '<tr>';
                for (let cell of cells) {
                    tableHtml += '<td style="border:1px solid #ddd; padding:6px;">' + escapeHtml(cell.trim()) + '</td>';
                }
                tableHtml += '</tr>';
            }
            tableHtml += '</table>';
            return tableHtml;
        }

        function applyZoom() {
            pdfWrapper.style.transform = `scale(${zoom})`;
            pdfWrapper.style.width = `${100 / zoom}%`;
            pdfWrapper.style.transformOrigin = 'top left';
        }

        function updateZoomDisplay() {
            document.getElementById('zoomLevel').textContent = `${Math.round(zoom * 100)}%`;
            applyZoom();
        }

        function clearHighlights() {
            const elements = pdfContent.querySelectorAll('.highlight, .highlight-current');
            elements.forEach(el => {
                el.classList.remove('highlight', 'highlight-current');
                // Restore original text
                if (el.getAttribute('data-original')) {
                    el.textContent = el.getAttribute('data-original');
                    el.removeAttribute('data-original');
                }
            });
            currentMatches = [];
            currentMatchIndex = -1;
            searchCounter.textContent = '0/0';
        }

        function performSearch() {
            clearHighlights();
            const searchTerm = searchInput.value.trim();
            if (!searchTerm || !currentContent) {
                searchCounter.textContent = '0/0';
                return;
            }
            
            let regex;
            const type = searchType.value;
            try {
                if (type === 'regex') {
                    regex = new RegExp(searchTerm, 'gi');
                } else if (type === 'case') {
                    regex = new RegExp(searchTerm.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g');
                } else {
                    regex = new RegExp(searchTerm.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
                }
            } catch(e) {
                alert('Invalid search pattern: ' + e.message);
                return;
            }
            
            // Get text nodes and highlight
            const walker = document.createTreeWalker(
                pdfContent,
                NodeFilter.SHOW_TEXT,
                {
                    acceptNode: function(node) {
                        if (node.parentElement && 
                            (node.parentElement.classList?.contains('highlight') || 
                             node.parentElement.classList?.contains('highlight-current'))) {
                            return NodeFilter.FILTER_REJECT;
                        }
                        return NodeFilter.FILTER_ACCEPT;
                    }
                }
            );
            
            const textNodes = [];
            while (walker.nextNode()) textNodes.push(walker.currentNode);
            
            let matchIndex = 0;
            const matchElements = [];
            
            textNodes.forEach(node => {
                const text = node.textContent;
                let match;
                regex.lastIndex = 0;
                const matches = [];
                while ((match = regex.exec(text)) !== null) {
                    matches.push({ start: match.index, end: match.index + match[0].length });
                }
                
                if (matches.length === 0) return;
                
                let lastIndex = 0;
                const fragments = [];
                for (const match of matches) {
                    if (match.start > lastIndex) {
                        fragments.push(document.createTextNode(text.substring(lastIndex, match.start)));
                    }
                    const span = document.createElement('span');
                    span.className = 'highlight';
                    span.setAttribute('data-match-id', matchIndex++);
                    span.textContent = text.substring(match.start, match.end);
                    fragments.push(span);
                    matchElements.push(span);
                    lastIndex = match.end;
                }
                if (lastIndex < text.length) {
                    fragments.push(document.createTextNode(text.substring(lastIndex)));
                }
                
                const parent = node.parentNode;
                parent.insertBefore(document.createComment('replacement'), node);
                for (const frag of fragments) {
                    parent.insertBefore(frag, node);
                }
                parent.removeChild(node);
            });
            
            currentMatches = matchElements;
            if (currentMatches.length > 0) {
                currentMatchIndex = 0;
                updateCurrentHighlight();
                scrollToMatch();
            } else {
                searchCounter.textContent = '0/0';
                alert('No matches found');
            }
        }
        
        function updateCurrentHighlight() {
            currentMatches.forEach((el, idx) => {
                if (idx === currentMatchIndex) {
                    el.classList.add('highlight-current');
                    el.classList.remove('highlight');
                } else {
                    el.classList.add('highlight');
                    el.classList.remove('highlight-current');
                }
            });
            searchCounter.textContent = `${currentMatchIndex + 1}/${currentMatches.length}`;
        }
        
        function scrollToMatch() {
            if (currentMatches[currentMatchIndex]) {
                currentMatches[currentMatchIndex].scrollIntoView({
                    behavior: 'smooth',
                    block: 'center'
                });
            }
        }
        
        function nextMatch() {
            if (currentMatches.length === 0) return;
            currentMatchIndex = (currentMatchIndex + 1) % currentMatches.length;
            updateCurrentHighlight();
            scrollToMatch();
        }
        
        function prevMatch() {
            if (currentMatches.length === 0) return;
            currentMatchIndex = (currentMatchIndex - 1 + currentMatches.length) % currentMatches.length;
            updateCurrentHighlight();
            scrollToMatch();
        }
        
        function clearSearch() {
            searchInput.value = '';
            clearHighlights();
        }
        
        function uploadNewFile() {
            fileInput.click();
        }
        
        function handleFileUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(evt) {
                const content = evt.target.result;
                const newFile = {
                    id: Date.now() + '_' + Math.random(),
                    name: file.name,
                    content: content,
                    createdAt: new Date().toISOString()
                };
                files.push(newFile);
                saveFilesToStorage();
                renderFileList();
                loadFile(newFile.id);
            };
            reader.readAsText(file);
            fileInput.value = '';
        }
        
        function clearAllFiles() {
            if (confirm('Are you sure you want to delete ALL files? This cannot be undone.')) {
                files = [];
                addDefaultFile();
                saveFilesToStorage();
                renderFileList();
                if (files.length > 0) loadFile(files[0].id);
                else {
                    currentContent = '';
                    pdfContent.innerHTML = '<p style="text-align:center; padding:50px;">No files available. Upload a new file.</p>';
                    currentFileInfo.textContent = 'No file loaded';
                }
            }
        }
        
        // Zoom with two-finger gesture (pinch)
        let initialDistance = 0;
        let initialZoom = 1;
        
        pdfWrapper.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                initialDistance = Math.hypot(dx, dy);
                initialZoom = zoom;
                e.preventDefault();
            }
        });
        
        pdfWrapper.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                const distance = Math.hypot(dx, dy);
                if (initialDistance > 0) {
                    const scale = distance / initialDistance;
                    let newZoom = initialZoom * scale;
                    newZoom = Math.min(Math.max(newZoom, 0.5), 3);
                    if (newZoom !== zoom) {
                        zoom = newZoom;
                        updateZoomDisplay();
                    }
                }
                e.preventDefault();
            }
        });
        
        // Event listeners
        uploadBtn.addEventListener('click', uploadNewFile);
        fileInput.addEventListener('change', handleFileUpload);
        searchBtn.addEventListener('click', performSearch);
        prevBtn.addEventListener('click', prevMatch);
        nextBtn.addEventListener('click', nextMatch);
        zoomInBtn.addEventListener('click', () => {
            zoom = Math.min(zoom + 0.1, 3);
            updateZoomDisplay();
        });
        zoomOutBtn.addEventListener('click', () => {
            zoom = Math.max(zoom - 0.1, 0.5);
            updateZoomDisplay();
        });
        resetZoomBtn.addEventListener('click', () => {
            zoom = 1.0;
            updateZoomDisplay();
        });
        clearAllBtn.addEventListener('click', clearAllFiles);
        
        // Scrollbar styling
        const style = document.createElement('style');
        style.textContent = `
            .scroll-container::-webkit-scrollbar {
                width: 12px;
                height: 12px;
            }
            .scroll-container::-webkit-scrollbar-track {
                background: #f1f1f1;
                border-radius: 10px;
            }
            .scroll-container::-webkit-scrollbar-thumb {
                background: #888;
                border-radius: 10px;
            }
            .scroll-container::-webkit-scrollbar-thumb:hover {
                background: #555;
            }
        `;
        document.head.appendChild(style);
        
        // Initialize
        loadFilesFromStorage();
        if (files.length > 0) {
            loadFile(files[0].id);
        }
        
        // Handle window resize
        window.addEventListener('resize', () => {
            applyZoom();
        });
    </script>
</body>
</html>
