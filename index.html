<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>DocuMind Vault - HD Reader & Library</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e4a6e">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>

    <style>
        :root { --primary: #1e4a6e; --bg: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: text; -webkit-tap-highlight-color: transparent; }
        
        body { font-family: 'Inter', sans-serif; background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Header */
        .app-bar {
            background: white; padding: 10px 15px; display: flex; align-items: center; 
            justify-content: space-between; gap: 10px; z-index: 100; border-bottom: 1px solid #e2e8f0;
        }
        
        .logo-area { display: flex; align-items: center; gap: 8px; }
        .logo-icon img { width: 30px; height: 30px; border-radius: 6px; }
        .logo-text { font-weight: 800; font-size: 1.1rem; color: var(--primary); display: none; }
        @media (min-width: 480px) { .logo-text { display: block; } }

        .search-box {
            flex: 1; display: flex; align-items: center; background: #f1f5f9; 
            padding: 6px 12px; border-radius: 50px; border: 1px solid #cbd5e1;
        }
        .search-box input { flex: 1; border: none; background: transparent; outline: none; font-size: 14px; min-width: 50px; }

        /* Main Layout */
        .main-layout { flex: 1; display: flex; overflow: hidden; position: relative; }

        /* Sidebar Library */
        .sidebar {
            width: 280px; background: white; border-right: 1px solid #e2e8f0;
            display: flex; flex-direction: column; transition: 0.3s ease;
            position: absolute; left: -280px; top: 0; bottom: 0; z-index: 200;
            box-shadow: 2px 0 12px rgba(0,0,0,0.1);
        }
        .sidebar.active { left: 0; }
        .sidebar-header { padding: 15px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; }

        .file-list { flex: 1; overflow-y: auto; padding: 10px; }
        .file-card {
            background: #fff; border: 1px solid #e2e8f0; padding: 10px; border-radius: 12px;
            margin-bottom: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
            transition: all 0.2s;
        }
        .file-card:hover { border-color: var(--primary); background: #f8fafc; }
        .file-card.active { background: #eff6ff; border-color: var(--primary); }

        /* ========== VIEWER DENGAN ZOOM & SCROLL BESAR ========== */
        .viewer-wrapper {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #2d2f33;
        }
        
        /* Kontainer scroll dengan scrollbar besar di kanan */
        .zoom-container {
            width: 100%;
            height: 100%;
            overflow: auto;
            position: relative;
            scroll-behavior: smooth;
        }
        
        /* CUSTOM SCROLLBAR YANG LEBIH BESAR & NYAMAN DI SAMPING KANAN */
        .zoom-container::-webkit-scrollbar {
            width: 14px;
            height: 14px;
        }
        .zoom-container::-webkit-scrollbar-track {
            background: #1e1f22;
            border-radius: 10px;
            margin: 4px;
        }
        .zoom-container::-webkit-scrollbar-thumb {
            background: #6b7280;
            border-radius: 10px;
            border: 2px solid #1e1f22;
            min-height: 60px;
        }
        .zoom-container::-webkit-scrollbar-thumb:hover {
            background: #9ca3af;
        }
        .zoom-container::-webkit-scrollbar-corner {
            background: #1e1f22;
        }
        
        /* Firefox scrollbar */
        .zoom-container {
            scrollbar-width: auto;
            scrollbar-color: #6b7280 #1e1f22;
        }
        
        /* Area konten yang di-scale untuk zoom */
        .zoomed-content {
            transform-origin: 0 0;
            transition: transform 0.06s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            will-change: transform;
            width: fit-content;
            min-width: 100%;
        }
        
        /* Konten viewer (halaman PDF atau DOCX) */
        .viewer-content {
            background: #525659;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        
        .page-wrapper {
            position: relative;
            background: white;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            border-radius: 2px;
        }
        canvas {
            display: block;
            max-width: 100%;
            height: auto;
            box-shadow: 0 0 0 1px rgba(0,0,0,0.05);
        }
        
        /* Text Layer untuk pencarian akurat */
        .text-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            opacity: 0.15;
            overflow: hidden;
        }
        .text-layer span {
            position: absolute;
            color: transparent;
            white-space: pre;
            transform-origin: 0% 0%;
            font-family: monospace;
        }
        
        /* Highlight style untuk hasil pencarian */
        mark.highlight {
            background: #ffeb3b;
            color: #1e293b;
            border-radius: 4px;
            padding: 0 2px;
            transition: all 0.1s;
        }
        mark.highlight.active {
            background: #f97316;
            color: white;
            box-shadow: 0 0 0 2px white, 0 0 0 4px #f97316;
            scale: 1.02;
            font-weight: 600;
        }
        
        /* Floating Buttons */
        .fab-group {
            position: fixed;
            bottom: 24px;
            right: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 300;
        }
        .fab {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: none;
            color: white;
            box-shadow: 0 6px 14px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }
        .fab:active { transform: scale(0.95); }
        .btn-add { background: var(--primary); }
        .btn-lib { background: #475569; }
        .btn-zoom-reset { background: #334155; }
        
        #loading {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            color: white;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }
        
        .docx-content {
            background: white;
            padding: 40px;
            width: 100%;
            max-width: 950px;
            border-radius: 16px;
            margin: 20px auto;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
            font-size: 1rem;
            line-height: 1.6;
        }
        
        /* Responsive */
        @media (max-width: 640px) {
            .zoom-container::-webkit-scrollbar {
                width: 10px;
                height: 10px;
            }
            .fab-group { bottom: 16px; right: 16px; gap: 10px; }
            .fab { width: 48px; height: 48px; font-size: 20px; }
        }
    </style>
</head>
<body>

<div id="loading">
    <i class="fas fa-spinner fa-spin fa-2x"></i>
    <p style="margin-top:12px; font-weight:500;">Memuat dokumen super cepat...</p>
</div>

<header class="app-bar">
    <div class="logo-area">
        <div class="logo-icon"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%231e4a6e'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' fill='white' font-size='48' font-weight='bold'%3EDV%3C/text%3E%3C/svg%3E" alt="Logo"></div>
        <div class="logo-text">DocuMind Vault</div>
    </div>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Cari kata atau kalimat (2 kalimat)...">
        <span id="matchStatus" style="font-size:12px; font-weight:700; background:#e2e8f0; padding:2px 6px; border-radius:20px; margin:0 5px;">0/0</span>
        <button onclick="navSearch(-1)" style="border:none; background:none; cursor:pointer; padding:4px;"><i class="fas fa-chevron-up"></i></button>
        <button onclick="navSearch(1)" style="border:none; background:none; cursor:pointer; padding:4px;"><i class="fas fa-chevron-down"></i></button>
    </div>
</header>

<div class="main-layout">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <strong><i class="fas fa-book-open"></i> Pustaka Saya</strong>
            <button onclick="toggleSidebar()" style="border:none; background:none; font-size:18px; cursor:pointer;"><i class="fas fa-times"></i></button>
        </div>
        <div class="file-list" id="fileList"></div>
    </aside>

    <div class="viewer-wrapper">
        <div class="zoom-container" id="zoomContainer">
            <div class="zoomed-content" id="zoomedContent">
                <div id="viewer" class="viewer-content">
                    <div style="color:#cbd5e1; text-align:center; margin-top:120px;">
                        <i class="fas fa-file-pdf fa-5x" style="opacity:0.4;"></i>
                        <p style="margin-top:16px; font-weight:500;">Pilih dokumen dari pustaka atau tambah file</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="fab-group">
    <button class="fab btn-zoom-reset" onclick="resetZoom()" title="Reset zoom (100%)"><i class="fas fa-expand-alt"></i></button>
    <button class="fab btn-lib" onclick="toggleSidebar()"><i class="fas fa-folder"></i></button>
    <button class="fab btn-add" onclick="document.getElementById('fileInput').click()"><i class="fas fa-plus"></i></button>
</div>

<input type="file" id="fileInput" hidden accept=".pdf,.docx">

<script>
    // ==================== INIT PDF.JS WORKER ====================
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
    
    // ==================== DATA STORAGE ====================
    let dbFiles = JSON.parse(localStorage.getItem('docu_vault_v5') || '[]');
    let matches = [];          // array of <mark> elements
    let currentMatchIdx = -1;
    let currentDocId = null;
    
    // Zoom & gesture variables
    let currentZoom = 1.0;
    const MIN_ZOOM = 0.6;
    const MAX_ZOOM = 4.2;
    let zoomedContentDiv = document.getElementById('zoomedContent');
    let zoomContainer = document.getElementById('zoomContainer');
    
    // Percepatan rendering dengan caching dan rendering async yang lebih efisien
    let pendingRenders = new Map(); // untuk mencegah render berulang
    
    // ==================== ZOOM & GESTURE ====================
    function applyZoom() {
        if (!zoomedContentDiv) return;
        zoomedContentDiv.style.transform = `scale(${currentZoom})`;
        // sedikit delay agar scrollbar menyesuaikan
        setTimeout(() => zoomContainer?.dispatchEvent(new Event('scroll')), 20);
    }
    
    function resetZoom() {
        currentZoom = 1.0;
        applyZoom();
        zoomContainer.scrollTo({ left: 0, top: 0, behavior: 'smooth' });
    }
    
    // Pinch-to-zoom (dua jari) yang sangat smooth
    let initialDistance = 0, initialZoom = 1.0, isPinching = false;
    function getDistance(touches) {
        if (touches.length < 2) return 0;
        const dx = touches[0].clientX - touches[1].clientX;
        const dy = touches[0].clientY - touches[1].clientY;
        return Math.hypot(dx, dy);
    }
    
    function onTouchStart(e) {
        if (e.touches.length === 2) {
            e.preventDefault();
            initialDistance = getDistance(e.touches);
            initialZoom = currentZoom;
            isPinching = true;
        }
    }
    
    function onTouchMove(e) {
        if (isPinching && e.touches.length === 2) {
            e.preventDefault();
            const newDistance = getDistance(e.touches);
            if (initialDistance > 0) {
                let ratio = newDistance / initialDistance;
                let newZoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, initialZoom * ratio));
                if (Math.abs(newZoom - currentZoom) > 0.01) {
                    currentZoom = newZoom;
                    applyZoom();
                }
            }
        }
    }
    
    function onTouchEnd(e) { isPinching = false; initialDistance = 0; }
    
    if (zoomContainer) {
        zoomContainer.addEventListener('touchstart', onTouchStart, { passive: false });
        zoomContainer.addEventListener('touchmove', onTouchMove, { passive: false });
        zoomContainer.addEventListener('touchend', onTouchEnd);
        // support wheel + ctrl
        zoomContainer.addEventListener('wheel', (e) => {
            if (e.ctrlKey) {
                e.preventDefault();
                const delta = -e.deltaY * 0.008;
                let newZoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, currentZoom + delta));
                if (newZoom !== currentZoom) {
                    currentZoom = newZoom;
                    applyZoom();
                }
            }
        }, { passive: false });
    }
    
    // ==================== UTILITIES ====================
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
    
    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }
    
    // Render daftar file di sidebar
    function renderLibrary() {
        const list = document.getElementById('fileList');
        if (!list) return;
        list.innerHTML = dbFiles.map(f => `
            <div class="file-card" onclick="displayFile('${f.id}')">
                <div style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:200px; font-size:13px;">
                    <i class="fas ${f.type === 'pdf' ? 'fa-file-pdf' : 'fa-file-word'}"></i> ${escapeHtml(f.name)}
                </div>
                <i class="fas fa-trash-alt" style="color:#f87171; padding:6px; border-radius:20px;" onclick="event.stopPropagation(); deleteFile('${f.id}')"></i>
            </div>
        `).join('');
    }
    
    async function deleteFile(id) {
        dbFiles = dbFiles.filter(f => f.id !== id);
        localStorage.setItem('docu_vault_v5', JSON.stringify(dbFiles));
        renderLibrary();
        if (currentDocId === id) {
            document.getElementById('viewer').innerHTML = `<div style="color:#94a3b8; text-align:center; margin-top:120px;">
                <i class="fas fa-trash-alt fa-4x"></i><p>Dokumen telah dihapus</p></div>`;
            currentDocId = null;
            matches = [];
            updateMatchStatus();
        }
    }
    
    // ========== RENDER PDF DENGAN OPTIMASI KECEPATAN ==========
    async function renderPDF(bytes, viewerDiv) {
        const pdf = await pdfjsLib.getDocument({ data: bytes.buffer, useSystemFonts: true, cMapUrl: 'https://cdn.jsdelivr.net/npm/pdfjs-dist@2.16.105/cmaps/', cMapPacked: true }).promise;
        const totalPages = pdf.numPages;
        // Render semua halaman secara paralel (dibatasi sedikit agar tidak overload)
        const renderPromises = [];
        for (let i = 1; i <= totalPages; i++) {
            renderPromises.push(renderPage(pdf, i, viewerDiv));
        }
        await Promise.all(renderPromises);
    }
    
    async function renderPage(pdf, pageNum, container) {
        const page = await pdf.getPage(pageNum);
        // Skala optimal untuk kualitas HD namun tidak boros memori (1.25 cukup tajam)
        const scale = 1.45;
        const viewport = page.getViewport({ scale });
        
        const wrapper = document.createElement('div');
        wrapper.className = 'page-wrapper';
        wrapper.setAttribute('data-page', pageNum);
        
        const canvas = document.createElement('canvas');
        canvas.height = viewport.height;
        canvas.width = viewport.width;
        canvas.style.width = '100%';
        canvas.style.height = 'auto';
        
        const textLayerDiv = document.createElement('div');
        textLayerDiv.className = 'text-layer';
        
        wrapper.appendChild(canvas);
        wrapper.appendChild(textLayerDiv);
        container.appendChild(wrapper);
        
        // Render grafis
        await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
        
        // Render text layer untuk pencarian akurat
        const textContent = await page.getTextContent();
        await pdfjsLib.renderTextLayer({
            textContent,
            container: textLayerDiv,
            viewport,
            textDivs: []
        }).promise;
    }
    
    // ========== DISPLAY FILE DENGAN LOADING CEPAT ==========
    async function displayFile(id) {
        const file = dbFiles.find(f => f.id === id);
        if (!file) return;
        currentDocId = id;
        // reset zoom dan scroll
        currentZoom = 1.0;
        applyZoom();
        if (zoomContainer) zoomContainer.scrollTo({ left: 0, top: 0, behavior: 'auto' });
        
        const loader = document.getElementById('loading');
        const viewerDiv = document.getElementById('viewer');
        loader.style.display = 'flex';
        viewerDiv.innerHTML = ''; // clear
        if (document.getElementById('sidebar').classList.contains('active')) toggleSidebar();
        
        // reset pencarian
        matches = [];
        currentMatchIdx = -1;
        document.getElementById('searchInput').value = '';
        updateMatchStatus();
        
        const bytes = new Uint8Array(atob(file.data).split("").map(c => c.charCodeAt(0)));
        try {
            if (file.type && file.type.toLowerCase() === 'pdf') {
                await renderPDF(bytes, viewerDiv);
            } else {
                // DOCX: gunakan mammoth dengan rendering cepat
                const result = await mammoth.convertToHtml({ arrayBuffer: bytes.buffer });
                const docxContainer = document.createElement('div');
                docxContainer.className = 'docx-content';
                docxContainer.innerHTML = result.value;
                viewerDiv.appendChild(docxContainer);
            }
            loader.style.display = 'none';
        } catch (err) {
            loader.style.display = 'none';
            viewerDiv.innerHTML = `<div style="background:#fff0f0; color:#b91c1c; padding:20px; margin:20px; border-radius:12px;"><i class="fas fa-exclamation-triangle"></i> Gagal: ${err.message}</div>`;
        }
    }
    
    // ==================== PENYEMPURNAAN PENCARIAN (HINGGA 2 KALIMAT) ====================
    // Fungsi untuk membersihkan highlight
    function clearHighlights() {
        document.querySelectorAll('mark.highlight').forEach(mark => {
            const parent = mark.parentNode;
            if (parent) {
                const textNode = document.createTextNode(mark.textContent);
                parent.replaceChild(textNode, mark);
                parent.normalize();
            }
        });
        matches = [];
        currentMatchIdx = -1;
    }
    
    // Fungsi pencarian mendukung 2 kalimat (multi-frase)
    function smartSearch(queryRaw) {
        clearHighlights();
        let query = queryRaw.trim().toLowerCase();
        if (query.length < 2) {
            updateMatchStatus();
            return;
        }
        
        // Split query menjadi beberapa frase berdasarkan pemisah seperti titik koma atau baris baru, atau kata "dan"?
        // Untuk mendukung hingga 2 kalimat: kita split berdasarkan titik (.) atau tanda tanya (!) namun batasi maks 2 bagian
        let sentences = [];
        // jika mengandung tanda baca kalimat, pisahkan jadi beberapa keyword.
        let temp = query.split(/[.!?;]+/).filter(s => s.trim().length > 0);
        if (temp.length > 2) {
            // ambil maks 2 kalimat pertama untuk performa & akurasi
            sentences = temp.slice(0, 2);
        } else if (temp.length >= 1) {
            sentences = temp;
        } else {
            sentences = [query];
        }
        
        // Hilangkan spasi berlebih di setiap frasa
        const searchTerms = sentences.map(s => s.trim().toLowerCase()).filter(s => s.length > 1);
        if (searchTerms.length === 0) return;
        
        const viewerElem = document.getElementById('viewer');
        // Traversal semua node teks
        const walker = document.createTreeWalker(viewerElem, NodeFilter.SHOW_TEXT, {
            acceptNode: (node) => {
                if (!node.nodeValue || node.nodeValue.trim() === "") return NodeFilter.FILTER_REJECT;
                let parent = node.parentElement;
                while(parent) {
                    if (parent.classList && (parent.classList.contains('text-layer') || parent.tagName === 'MARK')) 
                        return NodeFilter.FILTER_REJECT;
                    parent = parent.parentElement;
                }
                return NodeFilter.FILTER_ACCEPT;
            }
        });
        
        let textNodes = [];
        let node;
        while (node = walker.nextNode()) textNodes.push(node);
        
        // Untuk setiap term, lakukan pencarian dengan highlight independen agar multi-kalimat tercakup
        const allMarks = [];
        
        for (let term of searchTerms) {
            if (term.length === 0) continue;
            // escape regex
            const escapedTerm = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const regex = new RegExp(`(${escapedTerm})`, 'gi');
            
            textNodes.forEach(textNode => {
                const content = textNode.nodeValue;
                if (regex.test(content)) {
                    // kita perlu melakukan replace dengan mark, hati2 mengganti node yang sudah berubah
                    const span = document.createElement('span');
                    let lastIndex = 0;
                    let match;
                    regex.lastIndex = 0;
                    const parts = [];
                    while ((match = regex.exec(content)) !== null) {
                        if (match.index > lastIndex) {
                            parts.push(content.substring(lastIndex, match.index));
                        }
                        parts.push(match[0]);
                        lastIndex = match.index + match[0].length;
                    }
                    if (lastIndex < content.length) parts.push(content.substring(lastIndex));
                    
                    for (let part of parts) {
                        if (regex.test(part) || part.toLowerCase() === term) {
                            const mark = document.createElement('mark');
                            mark.className = 'highlight';
                            mark.textContent = part;
                            allMarks.push(mark);
                            span.appendChild(mark);
                        } else {
                            span.appendChild(document.createTextNode(part));
                        }
                    }
                    textNode.parentNode.replaceChild(span, textNode);
                }
            });
        }
        
        // Hapus mark duplikat / overlapping sederhana: kita gunakan unique berdasarkan posisi? biarkan saja karena user friendly.
        // filter marks unik berdasarkan referensi (bisa ada duplikat tidak masalah)
        matches = [...new Set(allMarks)];
        
        if (matches.length > 0) {
            currentMatchIdx = 0;
            updateSearchHighlight();
        } else {
            currentMatchIdx = -1;
        }
        updateMatchStatus();
    }
    
    function updateSearchHighlight() {
        matches.forEach((m, i) => {
            if (i === currentMatchIdx) {
                m.classList.add('active');
                m.scrollIntoView({ behavior: 'smooth', block: 'center' });
            } else {
                m.classList.remove('active');
            }
        });
    }
    
    function updateMatchStatus() {
        const total = matches.length;
        const idx = currentMatchIdx >= 0 ? currentMatchIdx + 1 : 0;
        document.getElementById('matchStatus').innerText = total > 0 ? `${idx}/${total}` : '0/0';
    }
    
    function navSearch(dir) {
        if (!matches.length) return;
        currentMatchIdx = (currentMatchIdx + dir + matches.length) % matches.length;
        updateSearchHighlight();
        updateMatchStatus();
    }
    
    // Event listener untuk input pencarian dengan debounce cepat
    let searchTimeout = null;
    document.getElementById('searchInput').addEventListener('input', (e) => {
        if (searchTimeout) clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            if (!currentDocId) return;
            smartSearch(e.target.value);
        }, 100);
    });
    
    // ========== PENYIMPANAN FILE DENGAN ENCODE CEPAT ==========
    document.getElementById('fileInput').onchange = function(e) {
        const file = e.target.files[0];
        if(!file) return;
        const loader = document.getElementById('loading');
        loader.style.display = 'flex';
        const reader = new FileReader();
        reader.onload = function(evt) {
            const binary = evt.target.result;
            const bytes = new Uint8Array(binary);
            let binaryString = '';
            // batch encoding untuk mempercepat konversi
            const chunkSize = 8000;
            for (let i = 0; i < bytes.length; i += chunkSize) {
                const chunk = bytes.subarray(i, i + chunkSize);
                binaryString += String.fromCharCode.apply(null, chunk);
            }
            const base64 = btoa(binaryString);
            const ext = file.name.split('.').pop().toLowerCase();
            const newDoc = { id: Date.now().toString(), name: file.name, data: base64, type: ext === 'pdf' ? 'pdf' : 'docx' };
            dbFiles.unshift(newDoc);
            localStorage.setItem('docu_vault_v5', JSON.stringify(dbFiles));
            renderLibrary();
            loader.style.display = 'none';
            displayFile(newDoc.id);
        };
        reader.readAsArrayBuffer(file);
    };
    
    // ========== INIT ==========
    renderLibrary();
    if (dbFiles.length > 0) {
        // Tampilkan dokumen pertama untuk pengalaman awal
        setTimeout(() => displayFile(dbFiles[0].id), 100);
    }
</script>
</body>
</html>
