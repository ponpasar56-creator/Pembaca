<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PDF Reader Pro - PT Mitra Setia Budi Sejahtera</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        :root {
            --primary: #e94560;
            --bg-dark: #1a1a2e;
            --toolbar-bg: #16213e;
            --accent: #0f3460;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg-dark);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .toolbar {
            background: var(--toolbar-bg);
            color: white;
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            border-bottom: 2px solid var(--accent);
            z-index: 1000;
        }

        .search-box { flex: 1; min-width: 200px; display: flex; gap: 5px; }
        .search-box input { flex: 1; padding: 10px; border-radius: 6px; border: none; outline: none; }

        button {
            background: var(--primary);
            border: none; color: white;
            padding: 8px 12px; border-radius: 6px;
            font-weight: bold; cursor: pointer;
        }

        .content-area {
            flex: 1;
            overflow: auto;
            background: #3a3d40;
            position: relative;
            -webkit-overflow-scrolling: touch;
        }

        /* Scrollbar Tebal */
        .content-area::-webkit-scrollbar { width: 14px; height: 14px; }
        .content-area::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
            border: 3px solid #3a3d40;
        }

        #pdfViewer {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            transform-origin: center top;
            min-width: 100%;
        }

        .pdf-page-wrapper {
            position: relative;
            margin-bottom: 20px;
            background: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        .highlight {
            background: rgba(255, 255, 0, 0.4);
            position: absolute;
            pointer-events: none;
            z-index: 5;
        }

        .highlight.current {
            background: rgba(255, 150, 0, 0.7);
            outline: 2px solid red;
            z-index: 10;
        }

        .loading-overlay {
            position: fixed;
            inset: 0; background: rgba(0,0,0,0.8);
            display: none; justify-content: center; align-items: center;
            color: white; z-index: 2000;
        }
    </style>
</head>
<body>

    <div class="loading-overlay" id="loader">Mohon Tunggu...</div>

    <div class="toolbar">
        <button onclick="document.getElementById('fileInput').click()">📁 Buka</button>
        <input type="file" id="fileInput" accept=".pdf" style="display: none;">
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Cari (contoh: front handle)...">
            <button onclick="startSearch()">🔍</button>
            <button onclick="prevMatch()">◀</button>
            <button onclick="nextMatch()">▶</button>
            <span id="searchStatus" style="font-size: 12px; width: 40px; text-align: center;">0/0</span>
        </div>
        
        <span id="zoomLabel" style="font-size:12px">100%</span>
    </div>

    <div class="content-area" id="scrollContainer">
        <div id="pdfViewer"></div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        let pdfDoc = null;
        let scale = 1.0;
        let visualScale = 1.0;
        let pagesData = []; // Menyimpan teks yang sudah di-index
        let matches = [];
        let currentMatchIdx = -1;

        // --- PINCH ZOOM STABLE ---
        let initialDist = 0;
        let isPinching = false;
        const pdfViewer = document.getElementById('pdfViewer');
        const scrollContainer = document.getElementById('scrollContainer');

        scrollContainer.addEventListener('touchstart', e => {
            if (e.touches.length === 2) {
                isPinching = true;
                initialDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            }
        }, { passive: false });

        scrollContainer.addEventListener('touchmove', e => {
            if (isPinching && e.touches.length === 2) {
                e.preventDefault();
                const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                visualScale = Math.min(Math.max(scale * (dist / initialDist), 0.5), 3.0);
                
                // HANYA transform visual, tidak merusak posisi scroll
                pdfViewer.style.transform = `scale(${visualScale / scale})`;
                document.getElementById('zoomLabel').textContent = Math.round(visualScale * 100) + '%';
            }
        }, { passive: false });

        scrollContainer.addEventListener('touchend', () => {
            if (isPinching) {
                isPinching = false;
                scale = visualScale;
                pdfViewer.style.transform = `scale(1)`;
                updatePagesLayout(); // Update ukuran tanpa menghapus elemen
            }
        });

        // --- FILE & INDEXING (Agar Pencarian Cepat) ---
        document.getElementById('fileInput').addEventListener('change', async e => {
            const file = e.target.files[0];
            if (!file) return;
            
            showLoader(true, "Membuka & Indexing...");
            const arrayBuffer = await file.arrayBuffer();
            pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            
            pdfViewer.innerHTML = '';
            pagesData = [];

            for (let i = 1; i <= pdfDoc.numPages; i++) {
                const page = await pdfDoc.getPage(i);
                
                // Buat Elemen Sekali Saja
                const wrapper = document.createElement('div');
                wrapper.className = 'pdf-page-wrapper';
                wrapper.id = `page-wrapper-${i}`;
                
                const canvas = document.createElement('canvas');
                wrapper.appendChild(canvas);
                pdfViewer.appendChild(wrapper);

                // Index Teks (Dilakukan hanya sekali saat load)
                const textContent = await page.getTextContent();
                let fullText = "";
                let charMap = [];
                textContent.items.forEach(item => {
                    let start = fullText.length;
                    fullText += item.str + " ";
                    for(let k=0; k <= item.str.length; k++) charMap.push(item);
                });

                pagesData.push({ 
                    page, canvas, wrapper, 
                    fullText, charMap,
                    num: i 
                });
            }
            await updatePagesLayout();
            showLoader(false);
        });

        // --- UPDATE LAYOUT (Tanpa Hapus Elemen) ---
        async function updatePagesLayout() {
            if (!pdfDoc) return;
            for (let data of pagesData) {
                const viewport = data.page.getViewport({ scale });
                data.wrapper.style.width = `${viewport.width}px`;
                data.wrapper.style.height = `${viewport.height}px`;
                data.canvas.width = viewport.width;
                data.canvas.height = viewport.height;
                
                data.page.render({ 
                    canvasContext: data.canvas.getContext('2d'), 
                    viewport 
                });
            }
            if(matches.length > 0) startSearch(); // Refresh posisi highlight
        }

        // --- PENCARIAN KILAT (Menggunakan Index) ---
        function startSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            document.querySelectorAll('.highlight').forEach(el => el.remove());
            matches = [];
            currentMatchIdx = -1;

            if (!query) return updateSearchUI();

            pagesData.forEach(data => {
                let foundIdx = data.fullText.toLowerCase().indexOf(query);
                while (foundIdx !== -1) {
                    const item = data.charMap[foundIdx];
                    const viewport = data.page.getViewport({ scale });
                    const tx = pdfjsLib.Util.transform(viewport.transform, item.transform);

                    const hl = document.createElement('div');
                    hl.className = 'highlight';
                    hl.style.left = `${tx[4]}px`;
                    hl.style.top = `${tx[5] - (Math.abs(item.transform[3]) * scale)}px`;
                    hl.style.width = `${item.width * scale}px`;
                    hl.style.height = `${Math.abs(item.transform[3]) * scale}px`;
                    
                    data.wrapper.appendChild(hl);
                    matches.push(hl);
                    foundIdx = data.fullText.toLowerCase().indexOf(query, foundIdx + 1);
                }
            });

            updateSearchUI();
            if (matches.length > 0) nextMatch();
        }

        function nextMatch() {
            if (matches.length === 0) return;
            if (currentMatchIdx >= 0) matches[currentMatchIdx].classList.remove('current');
            currentMatchIdx = (currentMatchIdx + 1) % matches.length;
            focusMatch();
        }

        function prevMatch() {
            if (matches.length === 0) return;
            if (currentMatchIdx >= 0) matches[currentMatchIdx].classList.remove('current');
            currentMatchIdx = (currentMatchIdx - 1 + matches.length) % matches.length;
            focusMatch();
        }

        function focusMatch() {
            const match = matches[currentMatchIdx];
            match.classList.add('current');
            match.scrollIntoView({ behavior: 'smooth', block: 'center' });
            updateSearchUI();
        }

        function updateSearchUI() {
            document.getElementById('searchStatus').textContent = 
                matches.length > 0 ? `${currentMatchIdx + 1}/${matches.length}` : "0/0";
        }

        function showLoader(show, text = "Memproses...") {
            const l = document.getElementById('loader');
            l.textContent = text;
            l.style.display = show ? 'flex' : 'none';
        }

        document.getElementById('searchInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') startSearch();
        });
    </script>
</body>
</html>
