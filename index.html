<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>DocuMind Vault - HD Reader</title>
    
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>

    <style>
        :root { --primary: #1e4a6e; --bg: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { font-family: 'Inter', sans-serif; background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .app-bar { flex: 0 0 auto; background: white; padding: 10px 15px; display: flex; align-items: center; justify-content: space-between; gap: 10px; border-bottom: 1px solid #e2e8f0; z-index: 100; }
        .search-box { flex: 1; display: flex; align-items: center; background: #f1f5f9; padding: 6px 12px; border-radius: 50px; border: 1px solid #cbd5e1; }
        .search-box input { flex: 1; border: none; background: transparent; outline: none; font-size: 14px; min-width: 50px; }

        .main-layout { flex: 1; display: flex; overflow: hidden; position: relative; }
        .sidebar { width: 260px; background: white; border-right: 1px solid #e2e8f0; position: absolute; left: -260px; top: 0; bottom: 0; z-index: 200; transition: 0.3s; display: flex; flex-direction: column; }
        .sidebar.active { left: 0; }
        
        .file-list { flex: 1; overflow-y: auto; padding: 10px; }
        .file-card { background: #fff; border: 1px solid #e2e8f0; padding: 10px; border-radius: 8px; margin-bottom: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .file-card:hover { border-color: var(--primary); }

        .viewer-container { flex: 1; overflow-y: auto; background: #525659; display: flex; flex-direction: column; align-items: center; padding: 15px; }
        .page-wrapper { position: relative; background: white; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        .fab-group { position: fixed; bottom: 20px; right: 20px; z-index: 300; display: flex; flex-direction: column; gap: 10px; }
        .fab { width: 50px; height: 50px; border-radius: 50%; border: none; background: var(--primary); color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor: pointer; }
    </style>
</head>
<body>

<header class="app-bar">
    <div style="width:30px;"><img src="109631.png" style="width:30px; border-radius:6px;"></div>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Cari kata...">
        <span id="matchStatus" style="font-size:12px; color:#64748b; margin:0 5px;">0/0</span>
        <button onclick="navSearch(-1)" style="border:none; background:none;"><i class="fas fa-chevron-up"></i></button>
        <button onclick="navSearch(1)" style="border:none; background:none;"><i class="fas fa-chevron-down"></i></button>
    </div>
</header>

<div class="main-layout">
    <aside class="sidebar" id="sidebar">
        <div style="padding:15px; border-bottom:1px solid #f1f5f9; display:flex; justify-content:space-between;">
            <strong>Pustaka</strong><button onclick="toggleSidebar()" style="border:none; background:none;"><i class="fas fa-times"></i></button>
        </div>
        <div class="file-list" id="fileList"></div>
    </aside>
    <main class="viewer-container" id="viewer"></main>
</div>

<div class="fab-group">
    <button class="fab" onclick="toggleSidebar()"><i class="fas fa-folder"></i></button>
    <button class="fab" onclick="document.getElementById('fileInput').click()"><i class="fas fa-plus"></i></button>
</div>

<input type="file" id="fileInput" hidden accept=".pdf,.docx">

<script>
    // Inisialisasi PDF.js
    const pdfjs = window['pdfjs-dist/build/pdf'];
    pdfjs.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    let dbFiles = JSON.parse(localStorage.getItem('docu_vault_v4') || '[]');
    let matches = [];
    let currentMatchIdx = -1;

    // Fungsi harus didefinisikan secara GLOBAL
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }

    function renderLibrary() {
        const list = document.getElementById('fileList');
        list.innerHTML = dbFiles.map(f => `
            <div class="file-card" onclick="displayFile('${f.id}')">
                <span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${f.name}</span>
                <i class="fas fa-trash-alt" style="color:#f87171;" onclick="event.stopPropagation(); deleteFile('${f.id}')"></i>
            </div>
        `).join('');
    }

    async function displayFile(id) {
        const file = dbFiles.find(f => f.id === id);
        if(!file) return;
        const viewer = document.getElementById('viewer');
        viewer.innerHTML = '<div style="color:white;">Loading...</div>';
        if(document.getElementById('sidebar').classList.contains('active')) toggleSidebar();
        
        const bytes = new Uint8Array(atob(file.data).split("").map(c => c.charCodeAt(0)));
        try {
            viewer.innerHTML = '';
            const pdf = await pdfjs.getDocument({data: bytes.buffer}).promise;
            for(let i=1; i<=pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const viewport = page.getViewport({scale: 1.5});
                const canvas = document.createElement('canvas');
                canvas.height = viewport.height; canvas.width = viewport.width;
                viewer.appendChild(canvas);
                await page.render({canvasContext: canvas.getContext('2d'), viewport}).promise;
            }
        } catch(e) { alert("Gagal memuat: " + e.message); }
    }

    function deleteFile(id) {
        dbFiles = dbFiles.filter(f => f.id !== id);
        localStorage.setItem('docu_vault_v4', JSON.stringify(dbFiles));
        renderLibrary();
    }

    // Event Listener utama
    document.addEventListener("DOMContentLoaded", () => {
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function() {
                const base64 = btoa(new Uint8Array(this.result).reduce((s, b) => s + String.fromCharCode(b), ''));
                const newDoc = { id: Date.now().toString(), name: file.name, data: base64, type: file.name.split('.').pop() };
                dbFiles.unshift(newDoc);
                localStorage.setItem('docu_vault_v4', JSON.stringify(dbFiles));
                renderLibrary();
                displayFile(newDoc.id);
                e.target.value = '';
            };
            reader.readAsArrayBuffer(file);
        });
        renderLibrary();
    });
</script>
</body>
</html>
