<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>DocuMind Vault - HD Reader & Library</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e4a6e">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>

    <style>
        :root { --primary: #1e4a6e; --bg: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { font-family: 'Inter', sans-serif; background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Header */
        .app-bar {
            background: white; padding: 10px 15px; display: flex; align-items: center; 
            justify-content: space-between; gap: 10px; z-index: 100; border-bottom: 1px solid #e2e8f0;
        }
        
        .logo-area { display: flex; align-items: center; gap: 8px; }
        .logo-icon img { width: 30px; height: 30px; border-radius: 6px; }
        .logo-text { font-weight: 800; font-size: 1.1rem; color: var(--primary); display: none; }
        @media (min-width: 480px) { .logo-text { display: block; } }

        .search-box {
            flex: 1; display: flex; align-items: center; background: #f1f5f9; 
            padding: 6px 12px; border-radius: 50px; border: 1px solid #cbd5e1;
        }
        .search-box input { flex: 1; border: none; background: transparent; outline: none; font-size: 14px; min-width: 50px; }

        /* Main Content */
        .main-layout { flex: 1; display: flex; overflow: hidden; position: relative; }

        /* Sidebar Library */
        .sidebar {
            width: 260px; background: white; border-right: 1px solid #e2e8f0;
            display: flex; flex-direction: column; transition: 0.3s;
            position: absolute; left: -260px; top: 0; bottom: 0; z-index: 200;
        }
        .sidebar.active { left: 0; }
        .sidebar-header { padding: 15px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; }

        .file-list { flex: 1; overflow-y: auto; padding: 10px; }
        .file-card {
            background: #fff; border: 1px solid #e2e8f0; padding: 10px; border-radius: 12px;
            margin-bottom: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
        }
        .file-card:hover { border-color: var(--primary); }
        .file-card.active { background: #eff6ff; border-color: var(--primary); }

        /* Viewer */
        .viewer-container { flex: 1; overflow: auto; background: #525659; display: flex; flex-direction: column; align-items: center; padding: 15px; }
        .page-wrapper { position: relative; background: white; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        canvas { display: block; max-width: 100%; height: auto; }
        
        /* Text Layer for Search */
        .text-layer { position: absolute; inset: 0; pointer-events: none; opacity: 0.2; overflow: hidden; }
        .text-layer span { position: absolute; color: transparent; white-space: pre; transform-origin: 0% 0%; }

        /* Highlight */
        mark.highlight { background: #ffeb3b; color: black; border-radius: 2px; }
        mark.highlight.active { background: #f57c00; color: white; scale: 1.1; }

        /* Floating Buttons */
        .fab-group { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 300; }
        .fab { width: 50px; height: 50px; border-radius: 50%; border: none; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .btn-add { background: var(--primary); }
        .btn-lib { background: #64748b; }

        #loading { position: fixed; inset: 0; background: rgba(0,0,0,0.7); color: white; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
    </style>
</head>
<body>

<div id="loading"><i class="fas fa-spinner fa-spin fa-2x"></i><p style="margin-top:10px">Menajamkan Teks...</p></div>

<header class="app-bar">
    <div class="logo-area">
        <div class="logo-icon"><img src="109631.png" alt="Logo"></div>
        <div class="logo-text">DocuMind Vault</div>
    </div>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Cari kata...">
        <span id="matchStatus" style="font-size:11px; font-weight:700; margin: 0 5px;">0/0</span>
        <button onclick="navSearch(-1)" style="border:none; background:none;"><i class="fas fa-chevron-up"></i></button>
        <button onclick="navSearch(1)" style="border:none; background:none;"><i class="fas fa-chevron-down"></i></button>
    </div>
</header>

<div class="main-layout">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <strong>Pustaka Saya</strong>
            <button onclick="toggleSidebar()" style="border:none; background:none;"><i class="fas fa-times"></i></button>
        </div>
        <div class="file-list" id="fileList"></div>
    </aside>

    <main class="viewer-container" id="viewer">
        <div style="color:white; opacity:0.3; text-align:center; margin-top:100px;">
            <i class="fas fa-file-pdf fa-4x"></i>
            <p style="margin-top:10px">Belum ada dokumen dibuka</p>
        </div>
    </main>
</div>

<div class="fab-group">
    <button class="fab btn-lib" onclick="toggleSidebar()"><i class="fas fa-folder"></i></button>
    <button class="fab btn-add" onclick="document.getElementById('fileInput').click()"><i class="fas fa-plus"></i></button>
</div>

<input type="file" id="fileInput" hidden accept=".pdf,.docx">

<script>
    const pdfjs = window['pdfjs-dist/build/pdf'];
    pdfjs.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    let dbFiles = JSON.parse(localStorage.getItem('docu_vault_v4') || '[]');
    let matches = [];
    let currentMatchIdx = -1;

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }

    // Simpan File ke LocalStorage
    document.getElementById('fileInput').onchange = function(e) {
        const file = e.target.files[0];
        if(!file) return;
        
        const reader = new FileReader();
        reader.onload = function() {
            const base64 = btoa(new Uint8Array(this.result).reduce((s, b) => s + String.fromCharCode(b), ''));
            const newDoc = { id: Date.now().toString(), name: file.name, data: base64, type: file.name.split('.').pop() };
            dbFiles.unshift(newDoc);
            localStorage.setItem('docu_vault_v4', JSON.stringify(dbFiles));
            renderLibrary();
            displayFile(newDoc.id);
        };
        reader.readAsArrayBuffer(file);
    };

    function renderLibrary() {
        const list = document.getElementById('fileList');
        list.innerHTML = dbFiles.map(f => `
            <div class="file-card" onclick="displayFile('${f.id}')">
                <div style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:180px; font-size:13px;">
                    <i class="fas fa-file-alt"></i> ${f.name}
                </div>
                <i class="fas fa-trash-alt" style="color:#f87171; padding:5px;" onclick="event.stopPropagation(); deleteFile('${f.id}')"></i>
            </div>
        `).join('');
    }

    function deleteFile(id) {
        dbFiles = dbFiles.filter(f => f.id !== id);
        localStorage.setItem('docu_vault_v4', JSON.stringify(dbFiles));
        renderLibrary();
        document.getElementById('viewer').innerHTML = '';
    }

    async function displayFile(id) {
        const file = dbFiles.find(f => f.id === id);
        if(!file) return;
        
        const loader = document.getElementById('loading');
        const viewer = document.getElementById('viewer');
        loader.style.display = 'flex';
        viewer.innerHTML = '';
        if(document.getElementById('sidebar').classList.contains('active')) toggleSidebar();

        const bytes = new Uint8Array(atob(file.data).split("").map(c => c.charCodeAt(0)));

        try {
            if(file.type.toLowerCase() === 'pdf') {
                const pdf = await pdfjs.getDocument({data: bytes.buffer}).promise;
                for(let i=1; i<=pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const viewport = page.getViewport({scale: 2.0}); // HD Rendering

                    const wrapper = document.createElement('div');
                    wrapper.className = 'page-wrapper';
                    
                    const canvas = document.createElement('canvas');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;
                    
                    const textLayer = document.createElement('div');
                    textLayer.className = 'text-layer';
                    
                    wrapper.appendChild(canvas);
                    wrapper.appendChild(textLayer);
                    viewer.appendChild(wrapper);

                    await page.render({canvasContext: canvas.getContext('2d'), viewport}).promise;
                    const textContent = await page.getTextContent();
                    await pdfjs.renderTextLayer({textContent, container: textLayer, viewport, textDivs: []}).promise;
                }
            } else {
                const res = await mammoth.convertToHtml({arrayBuffer: bytes.buffer});
                viewer.innerHTML = `<div style="background:white; padding:30px; width:100%; max-width:800px; border-radius:10px;">${res.value}</div>`;
            }
        } catch(e) { alert("Gagal memuat: " + e.message); }
        loader.style.display = 'none';
    }

    // Fitur Pencarian Akurat
    document.getElementById('searchInput').oninput = function() {
        const query = this.value.toLowerCase().trim();
        document.querySelectorAll('mark.highlight').forEach(m => m.replaceWith(m.textContent));
        matches = [];
        if(query.length < 2) return;

        const walker = document.createTreeWalker(document.getElementById('viewer'), NodeFilter.SHOW_TEXT);
        let node;
        while(node = walker.nextNode()) {
            if(node.nodeValue.toLowerCase().includes(query)) {
                const span = document.createElement('span');
                const parts = node.nodeValue.split(new RegExp(`(${query})`, 'gi'));
                parts.forEach(p => {
                    if(p.toLowerCase() === query) {
                        const m = document.createElement('mark');
                        m.className = 'highlight';
                        m.textContent = p;
                        matches.push(m);
                        span.appendChild(m);
                    } else span.appendChild(document.createTextNode(p));
                });
                node.parentNode.replaceChild(span, node);
            }
        }
        currentMatchIdx = 0;
        updateSearch();
    };

    function updateSearch() {
        document.getElementById('matchStatus').innerText = matches.length > 0 ? `${currentMatchIdx+1}/${matches.length}` : '0/0';
        matches.forEach((m, i) => m.classList.toggle('active', i === currentMatchIdx));
        if(matches[currentMatchIdx]) matches[currentMatchIdx].scrollIntoView({behavior:'smooth', block:'center'});
    }

    function navSearch(dir) {
        if(!matches.length) return;
        currentMatchIdx = (currentMatchIdx + dir + matches.length) % matches.length;
        updateSearch();
    }

    renderLibrary();
</script>
</body>
</html>
